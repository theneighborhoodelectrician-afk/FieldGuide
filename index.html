      --amber: #ffb020;

      --green: #31d78c;

      --red: #ff667a;
      --red-deep: rgba(255, 102, 122, 0.14);
      --shadow-lg: 0 18px 48px rgba(0, 0, 0, 0.35);
      --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.28);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
      --radius-sm: 10px;
      --container: 520px;

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }

      margin: 0;

    button, input, textarea, select {

    button {

      border: 0;
    }

    img {
      max-width: 100%;

    ::-webkit-scrollbar-thumb {

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }

      from { opacity: 0; transform: translateY(12px); }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
        scroll-behavior: auto !important;

    const PHOTO_LIBRARY = [
      { id: "recessed", label: "Recessed Lighting", emoji: "💡", tags: ["recessed", "lights", "ceiling", "lighting", "can light"], url: "https://images.unsplash.com/photo-1565538810643-b5bdb714032a?w=1200&q=80&auto=format&fit=crop" },
      { id: "panel", label: "Panel Upgrade", emoji: "⚡", tags: ["panel", "breaker", "service", "upgrade", "electrical panel"], url: "https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=1200&q=80&auto=format&fit=crop" },

      { id: "gfci", label: "GFCI Outlets", emoji: "🔧", tags: ["gfci", "outlet", "bathroom", "kitchen", "safety"], url: "https://images.unsplash.com/photo-1621905251918-48416bd8575a?w=1200&q=80&auto=format&fit=crop" },
      { id: "surge", label: "Surge Protection", emoji: "🛡️", tags: ["surge", "protection", "whole home"], url: "https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=1200&q=80&auto=format&fit=crop" },
      { id: "smart", label: "Smart Controls", emoji: "📱", tags: ["smart", "switch", "automation", "wifi"], url: "https://images.unsplash.com/photo-1558618047-3c8c76f2e949?w=1200&q=80&auto=format&fit=crop" }
    ];

    const STEP_META = {
      request: {
        num: 1,
        label: "Their Request",
        emoji: "🏠",
        accent: "var(--cyan)",
        accentSoft: "var(--cyan-deep)",
        question: "What did the customer ask for?",
        sub: "Capture the homeowner's ask in plain language.",
        placeholder: "Example: add 6 recessed lights in the living room, troubleshoot dead garage outlets, quote EV charger install..."
      },
      safety: {
        num: 2,
        label: "What You Found",
        emoji: "⚡",
        accent: "var(--amber)",
        accentSoft: "var(--amber-deep)",
        question: "What did you find on site?",
        sub: "Describe panel conditions, hazards, age clues, and anything code-related.",
        placeholder: "Example: panel has oxidation on main breaker, no GFCIs in kitchen, aluminum branch wiring, original 1970s service..."
      },
      enhancements: {
        num: 3,
        label: "Good Ideas",
        emoji: "💡",
        accent: "var(--green)",
        accentSoft: "var(--green-deep)",
        question: "What else would genuinely improve the home?",
        sub: "Keep it helpful, not salesy.",
        placeholder: "Example: dimmers, under-cabinet lighting, surge protection, smart switches..."
      }
    };

    const TIER_LABELS = {
      essential: "Just What They Asked",
      safety: "Safety First",
      comfort: "Added Comfort",
      recommended: "Recommended",
      enhanced: "Enhanced Home",
      complete: "Complete Picture"
    };

    const OPTION_COLORS = ["#3b82f6", "#0d9488", "#7c3aed", "#f59e0b", "#00c97a", "#4f46e5"];

    function loadRules() {
      try {
        const saved = localStorage.getItem("fg_rules");
        return saved ? JSON.parse(saved) : DEFAULT_RULES;
      } catch {
        return DEFAULT_RULES;
      }
    }

    function saveRules(rules) {
      try {
        localStorage.setItem("fg_rules", JSON.stringify(rules));
      } catch {}
    }

    function safeJsonParse(value, fallback = null) {
      try {
        return JSON.parse(value);
      } catch {
        return fallback;
      }
    }

    async function requestJson(url, options = {}) {
      const response = await fetch(url, options);
      const text = await response.text();
      const data = safeJsonParse(text, null);
      if (!response.ok) {
        throw new Error(data?.error || response.statusText || "Request failed");
      }
      return data;
    }

    async function callClaude(system, userText) {
      const body = {
        model: "claude-sonnet-4-20250514",
        max_tokens: 1500,
        messages: [{ role: "user", content: userText }]
      };
      if (system) body.system = system;

      try {
        const data = await requestJson("/api/claude", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });
        const rawText = data?.content?.[0]?.text || "";
        const cleaned = rawText.replace(/```json|```/g, "").trim();
        return safeJsonParse(cleaned, null);
      } catch {
        return null;
      }
    }

    async function callHCP(endpoint, method = "GET", body = null) {
      try {
        return await requestJson("/api/claude?action=hcp", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ endpoint, method, body })
        });
      } catch {
        return null;
      }
    }

    async function attachPhoto(imageUrl, estimateOptionId, caption) {
      try {
        return await requestJson("/api/claude?action=attach_photo", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ imageUrl, estimateOptionId, caption })
        });
      } catch {
        return null;
      }
    }

    async function fetchCloudinaryEstimatePhotos() {
      try {
        const data = await requestJson("/api/estimate-photos");
        return Array.isArray(data?.photos) ? data.photos : Array.isArray(data) ? data : [];
      } catch {
        return [];
      }
    }

    function buildSystemPrompt(rules, section) {
      const rulesText = rules.map((rule) => `- IF: "${rule.trigger}" THEN: "${rule.result}"`).join("\n");
      const sectionPrompts = {
        request: "Extract what the customer specifically asked for. Return requested_scopes array.",
        safety: "Analyze safety observations. Apply ALL Field Intelligence rules. Return safety_scopes with full expanded scopes.",
        enhancements: "Extract honest upgrade opportunities. Always include whole-home surge protection. Return enhancement_scopes array."
      };

      return `You are a master electrician with 30 years of estimating and service experience.

FIELD INTELLIGENCE RULES:
${rulesText}

YOUR JOB:
${sectionPrompts[section]}

Return ONLY valid JSON with no markdown.
For request use: {"requested_scopes":["scope"],"job_facts":{"location":"","quantity":"","panel_condition":"","structural_conditions":[],"home_age":""}}
For safety use: {"safety_scopes":["scope"],"job_facts":{"panel_condition":"","safety_risks":[],"urgency":"","triggers_panel_upgrade":false,"triggers_service_upgrade":false,"requires_permits":false}}
For enhancements use: {"enhancement_scopes":["scope"],"future_opportunities":[]}`;
    }

    function buildOptionsPrompt(scopes, rules) {
      return `You are a seasoned electrical estimator helping a field tech build homeowner-friendly estimate options.
Customer requested: ${JSON.stringify(scopes.requested)}
Safety items: ${JSON.stringify(scopes.safety)}
Enhancements: ${JSON.stringify(scopes.enhancements)}
Key rules: ${rules.slice(0, 10).map((r) => `${r.trigger} -> ${r.result}`).join("; ")}

Create exactly 6 estimate options.
- Be practical and honest.
- Never invent pricing.
- Group work logically.
- Include permit flag where appropriate.

Return ONLY valid JSON:
{"options":[{"number":1,"name":"Option name","tier":"essential|safety|comfort|recommended|enhanced|complete","includes":["item 1"],"permits_required":false,"value_statement":"What this means for the home"}]}`;
    }

    function getSuggestedPhotos(optionName, includes) {
      const haystack = `${optionName} ${(includes || []).join(" ")}`.toLowerCase();
      const scored = PHOTO_LIBRARY
        .map((photo) => ({
          ...photo,
          score: photo.tags.filter((tag) => haystack.includes(tag)).length
        }))
        .sort((a, b) => b.score - a.score);
      return scored.some((item) => item.score > 0) ? scored.filter((item) => item.score > 0) : PHOTO_LIBRARY;
    }

      return {
        background: "linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.03))",
        border: "1px solid var(--border)",
        borderRadius: "var(--radius-xl)",
        boxShadow: "var(--shadow-md)",
        ...extra
      };
    }

    function pageWrap(children) {
      return h("div", {

          width: "100%",
          maxWidth: "var(--container)",
          margin: "0 auto",
          padding: "20px 16px 56px"

    }

    function PrimaryButton({ children, onClick, disabled = false, color = "var(--cyan)", style = {}, type = "button" }) {
      return h("button", {
        type,
        onClick,
        disabled,
        style: {

          boxShadow: disabled ? "none" : "0 12px 28px rgba(0,0,0,0.24)",

        style: {
          padding: "10px 14px",
          borderRadius: "12px",
          background: selected ? "rgba(255,255,255,0.12)" : "rgba(255,255,255,0.04)",

          color: selected ? "var(--text)" : "var(--text-muted)",

    function Badge({ children, tone = "default" }) {
      const toneMap = {
        default: { bg: "rgba(255,255,255,0.06)", color: "var(--text-muted)", border: "var(--border)" },

    function Header({ techName, jobName, step, onReset, onOpenRules }) {
      const labels = [
        { key: "request", title: "Request" },

      return h("header", {
        style: {

          zIndex: 20,
          backdropFilter: "blur(16px)",
          background: "rgba(17, 21, 28, 0.76)",
          borderBottom: "1px solid rgba(255,255,255,0.06)"

      }, pageWrap([
        h("div", {
          key: "top",

          h("div", {

          }, "🧭"),
          h("div", { key: "name", style: { flex: 1, minWidth: 0 } }, [
            h("div", {
              key: "brand",
              style: {
                fontFamily: '"Barlow Condensed", sans-serif',
                fontWeight: 900,
                fontSize: 24,
                lineHeight: 1,
                letterSpacing: "0.08em"

        let live = true;

        (async () => {
          setLoading(true);
          setError("");

          const employeeData = await callHCP("/employees?page_size=100", "GET");
          const employee = employeeData?.employees?.find((item) =>
            (item.first_name || "").trim().toLowerCase() === techName.toLowerCase()
          );

          if (!employee?.id) {
            if (live) {
              setEstimates([]);
              setError("Could not match this tech to a Housecall Pro employee.");
              setLoading(false);
            }
            return;
          }

          const now = new Date();
          const start = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0).toISOString();
          const end = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59).toISOString();
          const estimateData = await callHCP(`/estimates?page_size=100&scheduled_start_min=${start}&scheduled_start_max=${end}`, "GET");
          const rawEstimates = estimateData?.estimates || (Array.isArray(estimateData) ? estimateData : []);
          const assigned = rawEstimates.filter((estimate) =>
            estimate.assigned_employees?.some((person) => person.id === employee.id)

          const detailed = await Promise.all(
            assigned.slice(0, 20).map(async (estimate) => (await callHCP(`/estimates/${estimate.id}`, "GET")) || estimate)

          if (live) {

      const [recording, setRecording] = useState(false);
      const [analyzing, setAnalyzing] = useState(false);
      const [error, setError] = useState("");
      const [extracted, setExtracted] = useState(saved?.extracted || null);
      const recognitionRef = useRef(null);

      useEffect(() => {
        return () => {
          recognitionRef.current?.stop?.();
        };
      }, []);

      const sectionKey = meta.num === 1 ? "request" : meta.num === 2 ? "safety" : "enhancements";
      const scopeKey = extracted ? Object.keys(extracted).find((key) => key.includes("scopes")) : null;
      const scopes = scopeKey ? extracted?.[scopeKey] || [] : [];

      function startVoice() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
          setError("Voice input is not available in this browser.");
          return;
        }

        setError("");
        const recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = "en-US";

        let committed = text;

        recognition.onresult = (event) => {
          let interim = "";
          for (let i = event.resultIndex; i < event.results.length; i += 1) {
            const transcript = event.results[i][0].transcript;
            if (event.results[i].isFinal) committed += `${transcript} `;
            else interim += transcript;
          }
          setText(`${committed}${interim}`.trimStart());
        };

        recognition.onerror = () => {
          setRecording(false);
        };
        recognition.onend = () => {
          setRecording(false);
        };

        recognition.start();
        recognitionRef.current = recognition;
        setRecording(true);
      }

      function stopVoice() {
        recognitionRef.current?.stop?.();
        setRecording(false);
      }

      async function analyze() {
        if (!text.trim()) return;
        setAnalyzing(true);
        setError("");
        const result = await callClaude(buildSystemPrompt(rules, sectionKey), text.trim());
        if (!result) {
          setError("The AI response could not be parsed. Try re-running it or tightening the notes.");
        } else {
          setExtracted(result);
        }
        setAnalyzing(false);

        if (!scopeKey) return;
        setExtracted({

    function OptionsStep({ scopes, rules, estimate }) {
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState("");
      const [options, setOptions] = useState([]);
      const [selected, setSelected] = useState({});
      const [expanded, setExpanded] = useState(null);
      const [photos, setPhotos] = useState({});
      const [pickerFor, setPickerFor] = useState(null);
      const [sending, setSending] = useState(false);
      const [sent, setSent] = useState(false);
      const [sendError, setSendError] = useState("");

      useEffect(() => {
        let live = true;

        (async () => {
          const result = await callClaude(null, buildOptionsPrompt(scopes, rules));
          if (!live) return;

          const built = Array.isArray(result?.options) ? result.options.filter((option) =>
            option &&
            option.number &&
            option.name &&
            Array.isArray(option.includes)
          ) : [];

          if (built.length) {
            setOptions(built);
          } else {
            setError("Could not build options from the AI response.");
          }
          setLoading(false);
        })().catch(() => {
          if (live) {
            setError("Could not build options.");
            setLoading(false);
          }
        });

        return () => {
          live = false;
        };
      }, [scopes, rules]);

      const selectedOptions = options.filter((option) => selected[option.number]);

      function toggleSelected(number) {
        setSelected((current) => ({ ...current, [number]: !current[number] }));
      }

      function handlePhotoSelect(url, label) {
        if (!pickerFor || !url) return;
        setPhotos((current) => ({
          ...current,
          [pickerFor.number]: { url, label }
        }));
        setPickerFor(null);
      }

      async function sendToHCP() {
        if (!estimate?.id || !selectedOptions.length) return;
        setSending(true);
        setSendError("");

        try {
          for (const option of selectedOptions) {
            const response = await callHCP(`/estimates/${estimate.id}/options`, "POST", {
              name: option.name,
              line_items: option.includes.map((item) => ({
                name: item,
                description: option.permits_required ? "Permits may be required." : "",
                unit_price: 0,
                quantity: 1
              }))
            });

            const optionId = response?.id || response?.estimate_option_id;
            const photo = photos[option.number];
            if (photo && optionId) {
              await attachPhoto(photo.url, optionId, photo.label);
            }
          }

          setSent(true);
        } catch {
          setSendError("Sending failed. Please try again.");
        }

        setSending(false);
      }

      if (loading) {
        return pageWrap(h(LoadingState, {

      const [result, setResult] = useState("");

        if (!trigger.trim() || !result.trim()) return;
        const updated = [...localRules, { id: Date.now(), trigger: trigger.trim(), result: result.trim() }];
        setLocalRules(updated);
        onSave(updated);
        setTrigger("");
        setResult("");
        setShowAdd(false);

        const updated = localRules.filter((rule) => rule.id !== id);
        setLocalRules(updated);
        onSave(updated);

      const [showRules, setShowRules] = useState(false);

      function resetFlow() {
        setStep("job");
        setEstimate(null);
        setData({});
        setScopes(null);
      }

        setData((current) => ({ ...current, [key]: result }));
        if (key === "request") setStep("safety");
        if (key === "safety") setStep("enhancements");
        if (key === "enhancements") setStep("review");
      }

      function jobName() {
        if (!estimate) return "";
        const customer = `${estimate.customer?.first_name || ""} ${estimate.customer?.last_name || ""}`.trim();
        return customer ? `${customer} - Est #${estimate.estimate_number || "Pending"}` : `Est #${estimate.estimate_number || "Pending"}`;

      if (!tech) {
        return h(TechSelector, { onSelect: setTech });
      }

      if (showRules) {
        return h(React.Fragment, null, [
          h(Header, {
            key: "header",
            techName: tech,
            jobName: jobName(),
            step,
            onReset: resetFlow,
            onOpenRules: () => setShowRules(false)
          }),
          h(IntelligenceScreen, {
            key: "rules",
            rules,
            onBack: () => setShowRules(false),
            onSave: (updated) => {
              setRules(updated);
              saveRules(updated);
            }
          })
        ]);
      }

      return h("div", null, [
        h(Header, {
          key: "header",
          techName: tech,
          jobName: jobName(),
          step,
          onReset: resetFlow,
          onOpenRules: () => setShowRules(true)
        }),
        step === "job" ? h(JobPicker, {
          key: "jobs",
          techName: tech,
          onSelect: (selectedEstimate) => {
            setEstimate(selectedEstimate);
            setStep("request");
          }
        }) : null,
        step === "request" ? h(InputStep, {
          key: "request",
          meta: STEP_META.request,
          saved: data.request,
          rules,
          onDone: (result) => saveStep("request", result)
        }) : null,
        step === "safety" ? h(InputStep, {
          key: "safety",
          meta: STEP_META.safety,
          saved: data.safety,
          rules,
          onDone: (result) => saveStep("safety", result)
        }) : null,
        step === "enhancements" ? h(InputStep, {
          key: "enhancements",
          meta: STEP_META.enhancements,
          saved: data.enhancements,
          rules,
          onDone: (result) => saveStep("enhancements", result)
        }) : null,
        step === "review" ? h(ReviewStep, {
          key: "review",
          data,
          onConfirm: (payload) => {
            setScopes(payload);
            setStep("options");
          }
        }) : null,
        step === "options" && scopes ? h(OptionsStep, {
          key: "options",
          scopes,
          rules,
          estimate
        }) : null
      ]);
    }

    createRoot(document.getElementById("root")).render(h(FieldGuide));
  </script>
</body>
</html>
