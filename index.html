<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#11151c" />
  <title>FieldGuide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #10141b;
      --panel: #1a202b;
      --panel-soft: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.1);
      --text: #eef2f7;
      --muted: #96a3ba;
      --dim: #6c7890;
      --cyan: #31d4ff;
      --cyan-soft: rgba(49,212,255,0.14);
      --amber: #ffb11f;
      --amber-soft: rgba(255,177,31,0.14);
      --green: #34d58b;
      --green-soft: rgba(52,213,139,0.14);
      --red: #ff6a7f;
      --red-soft: rgba(255,106,127,0.14);
      --shadow: 0 16px 40px rgba(0,0,0,0.32);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
      --container: 560px;
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      font-family: "Barlow", system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(49,212,255,0.12), transparent 28%),
        radial-gradient(circle at top right, rgba(255,177,31,0.08), transparent 22%),
        linear-gradient(180deg, #11151c 0%, #0d1015 100%);
      -webkit-font-smoothing: antialiased;
    }

    button, input, textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    img {
      display: block;
      max-width: 100%;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client"
      }
    }
  </script>

  <script type="module">
    import React, { useEffect, useMemo, useRef, useState } from "react";
    import { createRoot } from "react-dom/client";

    const h = React.createElement;

    const TECHS = [
      { label: "Brandon", hcpName: "Brandon" },
      { label: "Steve", hcpName: "Steve" },
      { label: "David", hcpName: "David" },
      { label: "Joe", hcpName: "Joe" },
      { label: "Lou", hcpName: "Lou" },
      { label: "Brayden", hcpName: "Brayden" },
      { label: "Andrew", hcpName: "Andrew" },
      { label: "Nate", hcpName: "Nate" }
    ];

    const DEFAULT_RULES = [
      { id: 1, trigger: "oxidation on breaker or main breaker", result: "Full panel replacement + service upgrade + outside disconnect + new ground system + permits required" },
      { id: 2, trigger: "rust inside panel or water damage in panel", result: "Full panel replacement + service upgrade + outside disconnect + new ground system + permits required" },
      { id: 3, trigger: "Federal Pacific, Stab-Lok, FPE, Zinsco, Pushmatic, or GE panel", result: "Known unsafe panel - full replacement required + outside service upgrade + new ground system" },
      { id: 4, trigger: "fuse box or fuse panel", result: "Unsafe - full panel upgrade required + outside service + new ground system + permits" },
      { id: 5, trigger: "double tapped breakers and panel is under 150 amps", result: "Full new service upgrade required + outside disconnect + new ground system + permits" },
      { id: 6, trigger: "double tapped breakers and panel is 150 amps or above", result: "Offer sub-panel installation OR full new service upgrade + outside disconnect + new ground system + permits" },
      { id: 7, trigger: "panel is full, no open breakers, does not accept tandem breakers, under 150 amps", result: "Full new service upgrade required + outside disconnect + new ground system + permits" },
      { id: 8, trigger: "panel is full, no open breakers, does not accept tandem breakers, 150 amps or above", result: "Offer sub-panel installation OR full new service upgrade" },
      { id: 9, trigger: "aluminum wiring on branch circuits", result: "Must replace wiring OR install CO/ALR rated devices at every location" },
      { id: 10, trigger: "ungrounded outlets or two-prong outlets", result: "Offer GFCI protection at each location OR GFCI breaker in panel" },
      { id: 11, trigger: "knob and tube wiring", result: "Only two options: leave it completely alone OR full house rewire" },
      { id: 12, trigger: "EV charger request", result: "Perform load calculation first - only recommend panel upgrade if load calc shows it cannot handle it" },
      { id: 13, trigger: "any job", result: "Always offer whole-home surge protection as an enhancement" }
    ];

    const PHOTO_LIBRARY = [
      { id: "recessed", label: "Recessed Lighting", emoji: "💡", tags: ["recessed", "lighting", "can"], url: "https://images.unsplash.com/photo-1565538810643-b5bdb714032a?w=1200&q=80&auto=format&fit=crop" },
      { id: "panel", label: "Panel Upgrade", emoji: "⚡", tags: ["panel", "service", "breaker"], url: "https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=1200&q=80&auto=format&fit=crop" },
      { id: "ev", label: "EV Charger", emoji: "🔌", tags: ["ev", "charger"], url: "https://images.unsplash.com/photo-1593941707882-a5bba14938c7?w=1200&q=80&auto=format&fit=crop" },
      { id: "gfci", label: "GFCI", emoji: "🔧", tags: ["gfci", "outlet"], url: "https://images.unsplash.com/photo-1621905251918-48416bd8575a?w=1200&q=80&auto=format&fit=crop" },
      { id: "surge", label: "Surge Protection", emoji: "🛡️", tags: ["surge", "protection"], url: "https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=1200&q=80&auto=format&fit=crop" }
    ];

    const STEP_META = {
      request: {
        title: "What They Called For",
        subtitle: "Start with the homeowner's exact ask.",
        color: "var(--cyan)",
        soft: "var(--cyan-soft)",
        placeholder: "Example: add 6 recessed lights in the kitchen, quote an EV charger, replace a ceiling fan..."
      },
      safety: {
        title: "What's Directly Connected",
        subtitle: "Describe findings, code issues, and anything logically tied to the ask.",
        color: "var(--amber)",
        soft: "var(--amber-soft)",
        placeholder: "Example: no brace box, panel corrosion, no GFCI, aluminum branch wiring, no room in panel..."
      },
      enhancements: {
        title: "What's Good / What's More",
        subtitle: "Note positives and worthwhile long-term improvements.",
        color: "var(--green)",
        soft: "var(--green-soft)",
        placeholder: "Example: open attic above, wiring in wall looks good, add dimmers, surge, smart controls..."
      }
    };

    const TIER_LABELS = {
      economy: "Economy",
      midrange: "Midrange",
      premium: "Premium"
    };

    const OPTION_COLORS = ["#2f7ef7", "#0f9b8e", "#6d41ea", "#f5a51f", "#22c86a", "#db4d88"];

    function safeJsonParse(value, fallback = null) {
      try {
        return JSON.parse(value);
      } catch {
        return fallback;
      }
    }

    async function requestJson(url, options = {}) {
      const response = await fetch(url, options);
      const text = await response.text();
      const data = safeJsonParse(text, null);
      if (!response.ok) {
        throw new Error(data?.error || text || response.statusText || "Request failed");
      }
      return data;
    }

    async function callClaude(system, userText) {
      const body = {
        model: "claude-sonnet-4-20250514",
        max_tokens: 1800,
        messages: [{ role: "user", content: userText }]
      };
      if (system) body.system = system;

      try {
        const data = await requestJson("/api/claude", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });
        const raw = data?.content?.[0]?.text || "";
        const cleaned = raw.replace(/```json|```/g, "").trim();
        return safeJsonParse(cleaned, null);
      } catch {
        return null;
      }
    }

    async function callHCP(endpoint, method = "GET", body = null) {
      try {
        return await requestJson("/api/claude?action=hcp", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ endpoint, method, body })
        });
      } catch {
        return null;
      }
    }

    async function attachPhoto(imageUrl, estimateOptionId, caption) {
      try {
        const response = await fetch("/api/claude?action=attach_photo", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ imageUrl, estimateOptionId, caption })
        });
        const text = await response.text();
        const data = safeJsonParse(text, { raw: text });
        if (!response.ok) {
          return {
            error: data?.error || "Attachment failed",
            status: response.status,
            hcp: data?.hcp || data
          };
        }
        return data;
      } catch (error) {
        return { error: error.message };
      }
    }

    async function fetchCloudinaryEstimatePhotos() {
      try {
        const data = await requestJson("/api/estimate-photos");
        return Array.isArray(data?.photos) ? data.photos : Array.isArray(data) ? data : [];
      } catch {
        return [];
      }
    }

    async function fetchPricebook() {
      try {
        const data = await requestJson("/pricebook.json");
        return Array.isArray(data) ? data : [];
      } catch {
        return [];
      }
    }

    function loadRules() {
      try {
        const raw = localStorage.getItem("fg_rules");
        return raw ? JSON.parse(raw) : DEFAULT_RULES;
      } catch {
        return DEFAULT_RULES;
      }
    }

    function saveRules(rules) {
      try {
        localStorage.setItem("fg_rules", JSON.stringify(rules));
      } catch {}
    }

    function buildAnalysisSystemPrompt(rules, section) {
      const rulesText = rules.map((rule) => `- IF: "${rule.trigger}" THEN: "${rule.result}"`).join("\n");
      const sectionPrompt = {
        request: "Extract the homeowner's actual ask. Return requested_scopes only for what they called for.",
        safety: "Extract what is directly connected to the ask, along with safety findings and code-related scope.",
        enhancements: "Extract positives and worthwhile long-term improvements. Always include whole-home surge protection when appropriate."
      }[section];

      return `You are a master electrician with 30 years of estimating experience.

FIELD INTELLIGENCE RULES:
${rulesText}

TASK:
${sectionPrompt}

Return ONLY valid JSON with no markdown.
For request use: {"requested_scopes":["scope"],"job_facts":{"panel_condition":"","home_age":"","notes":[]}}
For safety use: {"safety_scopes":["scope"],"job_facts":{"panel_condition":"","safety_risks":[],"requires_permits":false}}
For enhancements use: {"enhancement_scopes":["scope"],"job_facts":{"positives":[],"future_opportunities":[]}}`;
    }

    function buildPromptCatalog(items, pricingMode) {
      return items
        .filter((item) => item?.pricing?.[pricingMode] != null)
        .map((item) => ({
          id: item.id,
          name: item.name,
          category: item.category,
          description: item.description || "",
          price: item.pricing[pricingMode]
        }));
    }

    function buildOptionsPrompt(scopes, rules, catalog, pricingMode) {
      return `You are helping an electrical service technician build six clear estimate options for a homeowner.

Pricing mode: ${pricingMode === "in_home" ? "In Home" : "Preferred Builder"}

What they called for:
${JSON.stringify(scopes.requested)}

What's directly connected:
${JSON.stringify(scopes.safety)}

What's good / what's more:
${JSON.stringify(scopes.enhancements)}

Field rules:
${rules.slice(0, 10).map((rule) => `${rule.trigger} -> ${rule.result}`).join("; ")}

Available catalog items:
${JSON.stringify(catalog)}

Build exactly 6 options with this structure:
- 2 economy
- 2 midrange
- 2 premium

Rules:
- Every option must include the original homeowner ask.
- Economy options should focus on the immediate need and bare-minimum directly connected work.
- Midrange options should include the immediate need, directly connected work, and a stronger reliability/safety package.
- Premium options should feel turnkey, future-minded, and built to put the problem to rest for life.
- "What's directly connected" must be addressed before "what's more".
- Use only catalog items provided above.
- Never invent pricing.
- Each option must include at least one catalog item.
- Include a short focus_statement that explains the buyer intent.

Return ONLY valid JSON:
{"options":[
  {"number":1,"name":"Option name","tier":"economy","focus_statement":"Immediate need only","permits_required":false,"value_statement":"What this means for the home","pricebook_items":[{"id":"catalog-id","quantity":1}]},
  {"number":2,"name":"Option name","tier":"economy","focus_statement":"Immediate need plus essential connected work","permits_required":false,"value_statement":"What this means for the home","pricebook_items":[{"id":"catalog-id","quantity":1}]},
  {"number":3,"name":"Option name","tier":"midrange","focus_statement":"Balanced repair with connected improvements","permits_required":false,"value_statement":"What this means for the home","pricebook_items":[{"id":"catalog-id","quantity":1}]},
  {"number":4,"name":"Option name","tier":"midrange","focus_statement":"Stronger reliability and safety package","permits_required":false,"value_statement":"What this means for the home","pricebook_items":[{"id":"catalog-id","quantity":1}]},
  {"number":5,"name":"Option name","tier":"premium","focus_statement":"Turnkey solution with convenience and longevity","permits_required":false,"value_statement":"What this means for the home","pricebook_items":[{"id":"catalog-id","quantity":1}]},
  {"number":6,"name":"Option name","tier":"premium","focus_statement":"Best long-term put-it-to-rest solution","permits_required":false,"value_statement":"What this means for the home","pricebook_items":[{"id":"catalog-id","quantity":1}]}
]} `;
    }

    function getSuggestedPhotos(optionName, includes) {
      const haystack = `${optionName} ${(includes || []).join(" ")}`.toLowerCase();
      const scored = PHOTO_LIBRARY
        .map((item) => ({
          ...item,
          score: item.tags.filter((tag) => haystack.includes(tag)).length
        }))
        .sort((a, b) => b.score - a.score);
      return scored.some((item) => item.score > 0) ? scored.filter((item) => item.score > 0) : PHOTO_LIBRARY;
    }

    function getOptionId(value) {
      if (!value || typeof value !== "object") return null;
      if (typeof value.estimate_option_id === "string") return value.estimate_option_id;
      if (typeof value.id === "string") return value.id;
      for (const nested of Object.values(value)) {
        const found = getOptionId(nested);
        if (found) return found;
      }
      return null;
    }

    function dollarsToCents(value) {
      return Math.round((Number(value) || 0) * 100);
    }

    function shellCard(extra = {}) {
      return {
        background: "linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.03))",
        border: "1px solid var(--border)",
        borderRadius: "var(--radius-xl)",
        boxShadow: "var(--shadow)",
        ...extra
      };
    }

    function pageWrap(children) {
      return h("div", {
        style: {
          width: "100%",
          maxWidth: "var(--container)",
          margin: "0 auto",
          padding: "20px 16px 56px"
        }
      }, children);
    }

    function PrimaryButton({ children, onClick, disabled = false, color = "var(--cyan)", style = {} }) {
      return h("button", {
        type: "button",
        onClick,
        disabled,
        style: {
          width: "100%",
          padding: "15px 18px",
          borderRadius: "16px",
          background: disabled ? "rgba(255,255,255,0.08)" : color,
          color: disabled ? "var(--dim)" : "#071017",
          fontWeight: 800,
          letterSpacing: "0.05em",
          textTransform: "uppercase",
          ...style
        }
      }, children);
    }

    function SoftButton({ children, onClick, selected = false, style = {} }) {
      return h("button", {
        type: "button",
        onClick,
        style: {
          padding: "10px 14px",
          borderRadius: "12px",
          background: selected ? "rgba(255,255,255,0.12)" : "rgba(255,255,255,0.04)",
          border: selected ? "1px solid rgba(255,255,255,0.18)" : "1px solid var(--border)",
          color: selected ? "var(--text)" : "var(--muted)",
          fontWeight: 700,
          ...style
        }
      }, children);
    }

    function Badge({ children, tone = "default" }) {
      const toneMap = {
        default: { bg: "rgba(255,255,255,0.06)", color: "var(--muted)", border: "var(--border)" },
        cyan: { bg: "var(--cyan-soft)", color: "var(--cyan)", border: "rgba(49,212,255,0.22)" },
        amber: { bg: "var(--amber-soft)", color: "var(--amber)", border: "rgba(255,177,31,0.22)" },
        green: { bg: "var(--green-soft)", color: "var(--green)", border: "rgba(52,213,139,0.22)" },
        red: { bg: "var(--red-soft)", color: "var(--red)", border: "rgba(255,106,127,0.22)" }
      };
      const toneValue = toneMap[tone] || toneMap.default;
      return h("span", {
        style: {
          display: "inline-flex",
          alignItems: "center",
          gap: 6,
          padding: "4px 9px",
          borderRadius: "999px",
          background: toneValue.bg,
          border: `1px solid ${toneValue.border}`,
          color: toneValue.color,
          fontSize: 11,
          fontWeight: 800,
          textTransform: "uppercase",
          letterSpacing: "0.08em"
        }
      }, children);
    }

    function LoadingState({ title, body }) {
      return h("div", {
        style: {
          display: "flex",
          flexDirection: "column",
          alignItems: "center",
          gap: 14,
          padding: "64px 0"

      }, [
        h("div", {
          key: "spinner",
          style: {
            width: 56,
            height: 56,
            borderRadius: "50%",
            border: "3px solid rgba(255,255,255,0.1)",
            borderTopColor: "var(--cyan)",
            animation: "spin 0.9s linear infinite"

        h("div", { key: "title", style: { fontWeight: 800, fontSize: 18 } }, title),
        h("div", { key: "body", style: { color: "var(--muted)", fontSize: 14 } }, body)
      ]);
    }

    function EmptyState({ title, body, emoji = "📋" }) {
      return h("div", {
        style: {
          ...shellCard(),
          padding: "28px 20px",
          textAlign: "center"

        h("div", { key: "title", style: { fontWeight: 800, fontSize: 18, marginBottom: 6 } }, title),
        h("div", { key: "body", style: { color: "var(--muted)", lineHeight: 1.6 } }, body)
      ]);
    }

    function TechSelector({ onSelect }) {
      return h("div", {
        style: {
          minHeight: "100vh",
          display: "flex",
          alignItems: "center",
          justifyContent: "center",
          padding: "26px 18px"
        }
      }, pageWrap([
        h("div", {
          key: "hero",
          style: {
            ...shellCard(),
            padding: "26px 22px",
            marginBottom: 16,
            position: "relative",
            overflow: "hidden"
          }
        }, [
          h("div", {
            key: "orb",
            style: {
              position: "absolute",
              right: -40,
              bottom: -40,
              width: 120,
              height: 120,
              borderRadius: "50%",
              background: "radial-gradient(circle, rgba(49,212,255,0.22), transparent 70%)"
            }
          }),
          h("div", { key: "eyebrow", style: { color: "var(--cyan)", fontSize: 11, fontWeight: 800, letterSpacing: "0.18em", textTransform: "uppercase", marginBottom: 10 } }, "Electrical Estimating"),
          h("div", { key: "title", style: { fontFamily: '"Barlow Condensed", sans-serif', fontWeight: 900, fontSize: 38, letterSpacing: "0.06em", lineHeight: 0.95 } }, [
            "FIELD",
            h("span", { key: "guide", style: { color: "var(--cyan)" } }, "GUIDE")
          ]),
          h("p", { key: "copy", style: { margin: "12px 0 0", color: "var(--muted)", lineHeight: 1.6 } },
            "Capture the ask, structure the scope, build six purposeful options, and send clean estimates to Housecall Pro.")
        ]),
        h("div", {
          key: "grid",
          style: {
            display: "grid",
            gridTemplateColumns: "repeat(2, minmax(0, 1fr))",
            gap: 12
          }
        }, TECHS.map((tech, index) => h("button", {
          key: tech.label,
          type: "button",
          onClick: () => onSelect(tech),
          style: {
            ...shellCard(),
            padding: "18px 14px",
            color: "var(--text)",
            textAlign: "center",
            fontWeight: 800,
            fontSize: 16,
            animation: "fadeUp 0.25s ease both",
            animationDelay: `${index * 0.04}s`
          }
        }, tech.label)))
      ]));
    }

    function Header({ tech, jobName, step, onJobs, onRestart, onRules }) {
      const labels = ["request", "safety", "enhancements", "review", "options"];
      const stepIndex = labels.indexOf(step);

      return h("header", {
        style: {
          position: "sticky",
          top: 0,
          zIndex: 20,
          backdropFilter: "blur(14px)",
          background: "rgba(16,20,27,0.82)",
          borderBottom: "1px solid rgba(255,255,255,0.06)"
        }
      }, pageWrap([
        h("div", {
          key: "top",
          style: {
            display: "flex",
            alignItems: "center",
            gap: 12,
            paddingTop: 14,
            paddingBottom: 12
          }
        }, [
          h("div", {
            key: "logo",
            style: {
              width: 42,
              height: 42,
              borderRadius: 14,
              display: "grid",
              placeItems: "center",
              background: "linear-gradient(135deg, rgba(49,212,255,0.24), rgba(49,212,255,0.06))",
              border: "1px solid rgba(49,212,255,0.18)"
            }
          }, "🧭"),
          h("div", { key: "meta", style: { flex: 1, minWidth: 0 } }, [
            h("div", { key: "brand", style: { fontFamily: '"Barlow Condensed", sans-serif', fontWeight: 900, fontSize: 24, letterSpacing: "0.08em", lineHeight: 1 } }, [
              "FIELD",
              h("span", { key: "guide", style: { color: "var(--cyan)" } }, "GUIDE")
            ]),
            h("div", { key: "job", style: { marginTop: 4, color: "var(--muted)", fontSize: 12, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" } }, jobName || "Electrical Estimating")
          ]),
          h("div", { key: "actions", style: { display: "flex", gap: 8, alignItems: "center" } }, [
            h(SoftButton, { key: "rules", onClick: onRules, style: { color: "var(--amber)" } }, "Rules"),
            h(SoftButton, { key: "jobs", onClick: onJobs }, "Jobs"),
            h(SoftButton, { key: "restart", onClick: onRestart, style: { color: "var(--red)" } }, "Restart")
          ])
        ]),
        h("div", {
          key: "bottom",
          style: {
            display: "flex",
            alignItems: "center",
            justifyContent: "space-between",
            gap: 10,
            paddingBottom: 12
          }
        }, [
          h(Badge, { key: "tech", tone: "green" }, tech.label),
          stepIndex >= 0 ? h("div", {
            key: "steps",
            style: {
              display: "flex",
              gap: 8,
              overflowX: "auto"
            }
          }, labels.map((label, index) => {
            const active = step === label;
            const done = stepIndex > index;
            return h("div", {
              key: label,
              style: {
                display: "inline-flex",
                alignItems: "center",
                gap: 7,
                padding: "6px 10px",
                whiteSpace: "nowrap",
                borderRadius: "999px",

    function OptionsStep({ scopes, rules, estimate }) {
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState("");
      const [pricebook, setPricebook] = useState([]);
      const [pricingMode, setPricingMode] = useState("in_home");
      const [options, setOptions] = useState([]);
      const [selected, setSelected] = useState({});
      const [expanded, setExpanded] = useState(null);
      const [photos, setPhotos] = useState({});
      const [pickerFor, setPickerFor] = useState(null);
      const [sending, setSending] = useState(false);
      const [sent, setSent] = useState(false);
      const [sendMessage, setSendMessage] = useState("");

      useEffect(() => {
        let live = true;

        (async () => {
          setLoading(true);
          setError("");
          const pricebookItems = await fetchPricebook();
          if (!live) return;
          setPricebook(pricebookItems);

          const catalog = buildPromptCatalog(pricebookItems, pricingMode);
          const aiResult = await callClaude(null, buildOptionsPrompt(scopes, rules, catalog, pricingMode));
          if (!live) return;

          const byId = Object.fromEntries(pricebookItems.map((item) => [item.id, item]));
          const built = Array.isArray(aiResult?.options) ? aiResult.options.map((option) => {
            const matched = Array.isArray(option?.pricebook_items)
              ? option.pricebook_items
                  .map((match) => {
                    const item = byId[match?.id];
                    if (!item || item?.pricing?.[pricingMode] == null) return null;
                    return {
                      id: item.id,
                      name: item.name,
                      description: item.description || "",
                      price: item.pricing[pricingMode],
                      quantity: Math.max(1, Number(match?.quantity) || 1)
                    };
                  })
                  .filter(Boolean)
              : [];

            if (!option || !option.number || !option.name || !matched.length) return null;

            return {
              ...option,
              pricebook_items: matched,
              includes: matched.map((item) => `${item.quantity > 1 ? `${item.quantity}x ` : ""}${item.name}`)
            };
          }).filter(Boolean) : [];

          if (built.length) {
            setOptions(built);
          } else {
            setError("Could not build options from the AI response.");
          }
          setLoading(false);
        })().catch(() => {
          if (live) {
            setError("Could not build options.");
            setLoading(false);
          }
        });

        return () => {
          live = false;
        };
      }, [scopes, rules, pricingMode]);

      const selectedOptions = options.filter((option) => selected[option.number]);
      const inHomeCount = pricebook.filter((item) => item?.pricing?.in_home != null).length;
      const preferredCount = pricebook.filter((item) => item?.pricing?.preferred_builder != null).length;
      const availableCount = pricebook.filter((item) => item?.pricing?.[pricingMode] != null).length;

      async function sendToHCP() {
        if (!estimate?.id || !selectedOptions.length) return;
        setSending(true);
        setSendMessage("");
        const warnings = [];

        try {
          for (const option of selectedOptions) {
            const response = await callHCP(`/estimates/${estimate.id}/options`, "POST", {
              name: option.name,
              line_items: option.pricebook_items.map((item) => ({
                name: item.name,
                description: item.description || "",
                unit_price: dollarsToCents(item.price),
                quantity: item.quantity
              }))
            });

            const optionId = getOptionId(response);
            const photo = photos[option.number];

            if (photo && !optionId) {
              warnings.push(`"${option.name}" was created, but FieldGuide could not find the new HCP option ID to attach the photo.`);
            }

            if (photo && optionId) {
              const attachResult = await attachPhoto(photo.url, optionId, photo.label);
              if (!attachResult || attachResult.error) {
                const detail = [
                  attachResult?.error,
                  attachResult?.status ? `status ${attachResult.status}` : null,
                  attachResult?.hcp ? JSON.stringify(attachResult.hcp) : null
                ].filter(Boolean).join(" | ");
                warnings.push(`"${option.name}" was created, but the photo did not attach in HCP.${detail ? ` ${detail}` : ""}`);
              }
            }
          }

          setSendMessage(warnings.join(" "));
          setSent(true);
        } catch {
          setSendMessage("Sending failed. Please try again.");
        }

        setSending(false);
      }

      if (loading) {
        return pageWrap(h(LoadingState, {
          title: "Building options...",
          body: "Grouping scope into homeowner-friendly choices"
        }));
      }

      if (error) {
        return pageWrap(h(EmptyState, {
          title: "Options couldn't be built",
          body: error,
          emoji: "⚠️"
        }));
      }

      if (sent) {
        return pageWrap(h("div", {
          style: {
            ...shellCard(),
            padding: "34px 22px",
            textAlign: "center"
          }
        }, [
          h("div", {
            key: "check",
            style: {
              width: 84,
              height: 84,
              borderRadius: "50%",
              margin: "0 auto 14px",
              display: "grid",
              placeItems: "center",
              background: "var(--green-soft)",
              border: "1px solid rgba(52,213,139,0.28)",
              color: "var(--green)",
              fontSize: 36,
              fontWeight: 900
            }
          }, "✓"),
          h("div", { key: "title", style: { fontFamily: '"Barlow Condensed", sans-serif', fontWeight: 900, fontSize: 34, letterSpacing: "0.04em" } }, "Sent to Housecall Pro"),
          h("p", { key: "body", style: { margin: "10px 0 0", color: "var(--muted)", lineHeight: 1.6 } }, `${selectedOptions.length} option${selectedOptions.length > 1 ? "s were" : " was"} added to Estimate #${estimate.estimate_number || ""}.`),
          sendMessage ? h("div", {
            key: "warning",
            style: {
              marginTop: 14,
              padding: "12px 14px",
              borderRadius: "14px",
              border: "1px solid rgba(255,177,31,0.22)",
              background: "var(--amber-soft)",
              color: "var(--amber)",
              fontWeight: 700,
              lineHeight: 1.5,
              textAlign: "left"
            }
          }, sendMessage) : null
        ]));
      }

      return pageWrap([
        pickerFor ? h(PhotoPicker, {
          key: "picker",
          option: pickerFor,
          onClose: () => setPickerFor(null),
          onSelect: (url, label) => {
            if (!pickerFor || !url) return;
            setPhotos((current) => ({ ...current, [pickerFor.number]: { url, label } }));
            setPickerFor(null);
          }
        }) : null,
        h("div", { key: "intro", style: { marginBottom: 16 } }, [
          h("div", { key: "title", style: { fontFamily: '"Barlow Condensed", sans-serif', fontWeight: 900, fontSize: 34, letterSpacing: "0.04em" } }, `${options.length} Options Ready`),
          h("div", { key: "sub", style: { color: "var(--muted)", marginTop: 4 } }, "Two economy, two midrange, two premium.")
        ]),
        h("div", {
          key: "estimate",
          style: {
            ...shellCard(),
            marginBottom: 14,
            padding: "14px 16px"
          }
        }, [
          h("div", { key: "label", style: { color: "var(--cyan)", fontWeight: 800, fontSize: 11, letterSpacing: "0.16em", textTransform: "uppercase", marginBottom: 6 } }, "Estimate Target"),
          h("div", { key: "name", style: { fontWeight: 800, fontSize: 15 } }, `${estimate.customer?.first_name || ""} ${estimate.customer?.last_name || ""}`.trim() || "Customer"),
          estimate.address ? h("div", { key: "address", style: { marginTop: 4, color: "var(--muted)", fontSize: 13 } }, [estimate.address.street, estimate.address.city].filter(Boolean).join(", ")) : null,
          h("div", { key: "num", style: { marginTop: 8 } }, h(Badge, { tone: "cyan" }, `Est #${estimate.estimate_number || "Pending"}`))
        ]),
        h("div", {
          key: "pricing",
          style: {
            ...shellCard(),
            marginBottom: 14,
            padding: "14px 16px"
          }
        }, [
          h("div", { key: "label", style: { color: "var(--green)", fontWeight: 800, fontSize: 11, letterSpacing: "0.16em", textTransform: "uppercase", marginBottom: 6 } }, "Pricing Mode"),
          h("div", { key: "sub", style: { color: "var(--muted)", fontSize: 13, lineHeight: 1.5, marginBottom: 12 } }, "Choose which price book this estimate should follow before sending to Housecall Pro."),
          h("div", { key: "toggle", style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 } }, [
            h(SoftButton, { key: "in", onClick: () => setPricingMode("in_home"), selected: pricingMode === "in_home", style: { width: "100%", padding: "14px 12px", textAlign: "left" } }, `In Home (${inHomeCount})`),
            h(SoftButton, { key: "pb", onClick: () => setPricingMode("preferred_builder"), selected: pricingMode === "preferred_builder", style: { width: "100%", padding: "14px 12px", textAlign: "left" } }, `Preferred Builder (${preferredCount})`)
          ]),
          h("div", { key: "count", style: { marginTop: 12, color: "var(--muted)", fontSize: 13 } }, `${availableCount} catalog item${availableCount === 1 ? "" : "s"} available for this mode.`)
        ]),
        ...options.map((option, index) => {
          const color = OPTION_COLORS[index % OPTION_COLORS.length];
          const isSelected = !!selected[option.number];
          const isExpanded = expanded === option.number;
          const photo = photos[option.number];
          const total = option.pricebook_items.reduce((sum, item) => sum + (item.price * item.quantity), 0);

          return h("section", {
            key: option.number,
            style: {
              ...shellCard({ marginBottom: 12, overflow: "hidden", borderColor: isSelected ? color : "var(--border)" })
            }
          }, [
            h("div", {
              key: "head",
              style: {
                display: "grid",
                gridTemplateColumns: "56px 1fr 48px",
                alignItems: "stretch",
                background: `linear-gradient(135deg, ${color}, ${color}cc)`
              }
            }, [
              h("button", {
                key: "check",
                type: "button",
                onClick: () => setSelected((current) => ({ ...current, [option.number]: !current[option.number] })),
                style: {
                  background: "rgba(0,0,0,0.18)",
                  display: "grid",
                  placeItems: "center"
                }
              }, h("div", {
                style: {
                  width: 28,
                  height: 28,
                  borderRadius: 8,
                  display: "grid",
                  placeItems: "center",
                  background: isSelected ? "white" : "rgba(255,255,255,0.2)",
                  color: isSelected ? color : "transparent",
                  border: "2px solid rgba(255,255,255,0.45)",
                  fontWeight: 900
                }
              }, "✓")),
              h("button", {
                key: "summary",
                type: "button",
                onClick: () => setExpanded(isExpanded ? null : option.number),
                style: {
                  padding: "14px 14px 15px",
                  textAlign: "left",
                  background: "transparent",
                  color: "white"
                }
              }, [
                h("div", { key: "name", style: { fontWeight: 800, fontSize: 17, lineHeight: 1.2 } }, option.name),
                option.focus_statement ? h("div", { key: "focus", style: { marginTop: 4, fontSize: 12, fontWeight: 700, color: "rgba(255,255,255,0.82)" } }, option.focus_statement) : null,
                h("div", { key: "badges", style: { marginTop: 7, display: "flex", gap: 8, flexWrap: "wrap" } }, [
                  h(Badge, { key: "tier", tone: "default" }, TIER_LABELS[option.tier] || option.tier),
                  option.permits_required ? h(Badge, { key: "permits", tone: "amber" }, "Permits") : null,
                  photo ? h(Badge, { key: "photo", tone: "green" }, "Photo") : null
                ])
              ]),
              h("button", {
                key: "toggle",
                type: "button",
                onClick: () => setExpanded(isExpanded ? null : option.number),
                style: {
                  background: "rgba(0,0,0,0.14)",
                  color: "rgba(255,255,255,0.75)",
                  fontSize: 18
                }
              }, isExpanded ? "▴" : "▾")
            ]),
            isExpanded ? h("div", {
              key: "detail",
              style: {
                padding: "16px",
                borderTop: "1px solid var(--border)"
              }
            }, [
              h("div", { key: "value", style: { color: "var(--muted)", fontStyle: "italic", lineHeight: 1.6, marginBottom: 12 } }, `"${option.value_statement}"`),
              option.focus_statement ? h("div", { key: "focus2", style: { marginBottom: 12, color: "var(--text)", fontSize: 13, fontWeight: 700 } }, `Focus: ${option.focus_statement}`) : null,
              h("div", {
                key: "total",
                style: {
                  display: "inline-flex",
                  alignItems: "center",
                  gap: 6,
                  marginBottom: 12,
                  padding: "6px 10px",
                  borderRadius: "999px",
                  background: "rgba(255,255,255,0.06)",
                  border: "1px solid var(--border)",
                  fontWeight: 700
                }
              }, `Estimated total: $${total.toFixed(2)}`),
              h("div", { key: "inclabel", style: { color: "var(--dim)", fontSize: 12, fontWeight: 800, letterSpacing: "0.16em", textTransform: "uppercase", marginBottom: 10 } }, "What's Included"),
              ...option.pricebook_items.map((item, itemIndex) => h("div", {
                key: `${option.number}-${itemIndex}`,
                style: {
                  display: "flex",
                  alignItems: "center",
                  gap: 10,
                  padding: "11px 12px",
                  marginBottom: 8,
                  borderRadius: "14px",
                  background: "rgba(255,255,255,0.04)",
                  border: "1px solid var(--border)"
                }
              }, [
                h("div", { key: "dot", style: { width: 8, height: 8, borderRadius: "50%", background: color, flexShrink: 0 } }),
                h("div", { key: "text", style: { flex: 1, fontWeight: 600, lineHeight: 1.5 } }, `${item.quantity > 1 ? `${item.quantity}x ` : ""}${item.name}`),
                h("div", { key: "price", style: { color: "var(--muted)", fontWeight: 700 } }, `$${(item.price * item.quantity).toFixed(2)}`)
              ])),
              h("div", {
                key: "photo-block",
                style: {
                  marginTop: 14,
                  paddingTop: 14,
                  borderTop: "1px solid var(--border)"
                }
              }, [
                h("div", { key: "photo-title", style: { color: "var(--dim)", fontSize: 12, fontWeight: 800, letterSpacing: "0.16em", textTransform: "uppercase", marginBottom: 10 } }, "Finished Work Photo"),
                photo ? h("div", { key: "photo-wrap" }, [
                  h("div", {
                    key: "img",
                    style: {
                      position: "relative",
                      overflow: "hidden",
                      borderRadius: "16px",
                      border: "1px solid var(--border)"
                    }
                  }, [
                    h("img", { key: "photo", src: photo.url, alt: photo.label, style: { width: "100%", height: 180, objectFit: "cover" } }),
                    h("div", { key: "caption", style: { position: "absolute", left: 10, bottom: 10, padding: "5px 8px", borderRadius: "10px", background: "rgba(0,0,0,0.68)", color: "white", fontSize: 12 } }, photo.label)
                  ]),
                  h("div", { key: "actions", style: { display: "flex", gap: 8, marginTop: 10 } }, [
                    h(SoftButton, { key: "change", onClick: () => setPickerFor(option) }, "Change"),
                    h(SoftButton, {
                      key: "remove",
                      onClick: () => setPhotos((current) => {
                        const next = { ...current };
                        delete next[option.number];
                        return next;
                      }),
                      style: { color: "var(--red)" }
                    }, "Remove")
                  ])
                ]) : h(SoftButton, {
                  key: "add",
                  onClick: () => setPickerFor(option),
                  style: {
                    width: "100%",
                    padding: "15px 14px",
                    borderStyle: "dashed",
                    color
                  }
                }, "Add Photo")
              ])
            ]) : null
          ]);
        }),
        sendMessage && !sent ? h("div", {
          key: "error",
          style: {
            ...shellCard({ borderColor: "rgba(255,106,127,0.22)" }),
            marginBottom: 12,
            padding: "12px 14px",
            color: "var(--red)"
          }
        }, sendMessage) : null,
        selectedOptions.length ? h(PrimaryButton, {
          key: "send",
          onClick: sendToHCP,
          disabled: sending,
          color: "var(--amber)"
        }, sending ? "Sending to Housecall Pro..." : `Add ${selectedOptions.length} Option${selectedOptions.length > 1 ? "s" : ""} to Housecall Pro`) : null
      ]);
    }

    function RulesScreen({ rules, onBack, onSave }) {
      const [localRules, setLocalRules] = useState(rules);
      const [showAdd, setShowAdd] = useState(false);
      const [trigger, setTrigger] = useState("");
      const [result, setResult] = useState("");

      function addRule() {
        if (!trigger.trim() || !result.trim()) return;
        const updated = [...localRules, { id: Date.now(), trigger: trigger.trim(), result: result.trim() }];
        setLocalRules(updated);
        onSave(updated);
        setTrigger("");
        setResult("");
        setShowAdd(false);
      }

      function removeRule(id) {
        const updated = localRules.filter((rule) => rule.id !== id);
        setLocalRules(updated);
        onSave(updated);
      }

      return pageWrap([
        h("div", { key: "back", style: { marginBottom: 12 } }, h(SoftButton, { onClick: onBack }, "Back")),
        h("div", {
          key: "hero",
          style: {
            ...shellCard(),
            padding: "22px 18px",
            marginBottom: 14
          }
        }, [
          h("div", { key: "eyebrow", style: { color: "var(--amber)", fontWeight: 800, fontSize: 11, letterSpacing: "0.18em", textTransform: "uppercase", marginBottom: 10 } }, "Electrical Rules Engine"),
          h("div", { key: "title", style: { fontFamily: '"Barlow Condensed", sans-serif', fontWeight: 900, fontSize: 34, letterSpacing: "0.04em" } }, "Field Intelligence"),
          h("div", { key: "copy", style: { color: "var(--muted)", lineHeight: 1.6, marginTop: 10 } }, "These rules teach FieldGuide how to expand field notes into real scope.")
        ]),
        h(SoftButton, { key: "toggle", onClick: () => setShowAdd((current) => !current), style: { width: "100%", padding: "14px 16px", color: showAdd ? "var(--muted)" : "var(--green)" } }, showAdd ? "Cancel" : "Add New Rule"),
        showAdd ? h("div", {
          key: "form",
          style: {
            ...shellCard(),
            padding: "16px",
            marginTop: 12,
            marginBottom: 12
          }
        }, [
          h("div", { key: "l1", style: { marginBottom: 8, color: "var(--green)", fontWeight: 800, fontSize: 12, letterSpacing: "0.14em", textTransform: "uppercase" } }, "When tech sees..."),
          h("textarea", {
            key: "trigger",
            value: trigger,
            onChange: (event) => setTrigger(event.target.value),
            style: {
              width: "100%",
              minHeight: 84,
              padding: "12px 14px",
              borderRadius: "14px",
              border: "1px solid var(--border)",
              background: "rgba(255,255,255,0.03)",
              color: "var(--text)",
              resize: "vertical"
            }
          }),
          h("div", { key: "l2", style: { margin: "14px 0 8px", color: "var(--green)", fontWeight: 800, fontSize: 12, letterSpacing: "0.14em", textTransform: "uppercase" } }, "AI should include..."),
          h("textarea", {
            key: "result",
            value: result,
            onChange: (event) => setResult(event.target.value),
            style: {
              width: "100%",
              minHeight: 84,
              padding: "12px 14px",
              borderRadius: "14px",
              border: "1px solid var(--border)",
              background: "rgba(255,255,255,0.03)",
              color: "var(--text)",
              resize: "vertical"
            }
          }),
          h(PrimaryButton, { key: "save", onClick: addRule, color: "var(--green)", style: { marginTop: 14 } }, "Save Rule")
        ]) : null,
        ...localRules.map((rule) => h("div", {
          key: rule.id,
          style: {
            ...shellCard(),
            overflow: "hidden",
            marginBottom: 12
          }
        }, [
          h("div", { key: "a", style: { padding: "14px 16px", borderBottom: "1px solid var(--border)" } }, [
            h("div", { key: "l", style: { color: "var(--amber)", fontWeight: 800, fontSize: 11, letterSpacing: "0.14em", textTransform: "uppercase", marginBottom: 6 } }, "When tech sees..."),
            h("div", { key: "t", style: { lineHeight: 1.55, fontWeight: 700 } }, rule.trigger)
          ]),
          h("div", { key: "b", style: { padding: "14px 16px", background: "rgba(52,213,139,0.04)", borderBottom: "1px solid var(--border)" } }, [
            h("div", { key: "l", style: { color: "var(--green)", fontWeight: 800, fontSize: 11, letterSpacing: "0.14em", textTransform: "uppercase", marginBottom: 6 } }, "AI includes..."),
            h("div", { key: "r", style: { color: "var(--muted)", lineHeight: 1.55 } }, rule.result)
          ]),
          h("div", { key: "c", style: { padding: "10px 16px", display: "flex", justifyContent: "flex-end" } }, h(SoftButton, { onClick: () => removeRule(rule.id), style: { color: "var(--red)" } }, "Remove"))
        ]))
      ]);
    }

    function FieldGuide() {
      const [tech, setTech] = useState(null);
      const [step, setStep] = useState("job");
      const [estimate, setEstimate] = useState(null);
      const [data, setData] = useState({});
      const [scopes, setScopes] = useState(null);
      const [rules, setRules] = useState(loadRules());
      const [showRules, setShowRules] = useState(false);

      function restartApp() {
        setTech(null);
        setStep("job");
        setEstimate(null);
        setData({});
        setScopes(null);
        setShowRules(false);
      }

      function goToJobs() {
        setStep("job");
        setEstimate(null);
        setData({});
        setScopes(null);
      }

      function saveStep(key, result) {
        setData((current) => ({ ...current, [key]: result }));
        if (key === "request") setStep("safety");
        if (key === "safety") setStep("enhancements");
        if (key === "enhancements") setStep("review");
      }

      function jobName() {
        if (!estimate) return "";
        const customer = `${estimate.customer?.first_name || ""} ${estimate.customer?.last_name || ""}`.trim();
        return customer ? `${customer} - Est #${estimate.estimate_number || "Pending"}` : `Est #${estimate.estimate_number || "Pending"}`;
      }

      if (!tech) {
        return h(TechSelector, { onSelect: setTech });
      }

      return h("div", null, [
        h(Header, {
          key: "header",
          tech,
          jobName: jobName(),
          step: showRules ? "rules" : step,
          onJobs: goToJobs,
          onRestart: restartApp,
          onRules: () => setShowRules(true)
        }),
        showRules ? h(RulesScreen, {
          key: "rules",
          rules,
          onBack: () => setShowRules(false),
          onSave: (updated) => {
            setRules(updated);
            saveRules(updated);
          }
        }) : null,
        !showRules && step === "job" ? h(JobPicker, {
          key: "job",
          tech,
          onSelect: (selectedEstimate) => {
            setEstimate(selectedEstimate);
            setStep("request");
          }
        }) : null,
        !showRules && step === "request" ? h(InputStep, {
          key: "request",
          stepKey: "request",
          saved: data.request,
          rules,
          onDone: (result) => saveStep("request", result)
        }) : null,
        !showRules && step === "safety" ? h(InputStep, {
          key: "safety",
          stepKey: "safety",
          saved: data.safety,
          rules,
          onDone: (result) => saveStep("safety", result)
        }) : null,
        !showRules && step === "enhancements" ? h(InputStep, {
          key: "enhancements",
          stepKey: "enhancements",
          saved: data.enhancements,
          rules,
          onDone: (result) => saveStep("enhancements", result)
        }) : null,
        !showRules && step === "review" ? h(ReviewStep, {
          key: "review",
          data,
          onConfirm: (payload) => {
            setScopes(payload);
            setStep("options");
          }
        }) : null,
        !showRules && step === "options" && scopes ? h(OptionsStep, {
          key: "options",
          scopes,
          rules,
          estimate
        }) : null
      ]);
    }

    createRoot(document.getElementById("root")).render(h(FieldGuide));
  </script>
</body>
</html>
