    const TECHS = ["Brandon","Steve","David","Joe","Lou","Brayden","Andrew","Nate"];

      { id:"recessed", label:"Recessed Lighting",     emoji:"💡", tags:["recessed","lights","ceiling","lighting","can light"], url:"https://images.unsplash.com/photo-1565538810643-b5bdb714032a?w=800&q=80" },
      { id:"panel",    label:"Panel Upgrade",          emoji:"⚡", tags:["panel","breaker","service","upgrade","electrical panel","fuse"], url:"https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=800&q=80" },
      { id:"ev",       label:"EV Charger",             emoji:"🔌", tags:["ev","charger","electric vehicle","car charger","level 2"], url:"https://images.unsplash.com/photo-1593941707882-a5bba14938c7?w=800&q=80" },
      { id:"gfci",     label:"GFCI Outlets",           emoji:"🔧", tags:["gfci","outlet","bathroom","kitchen","safety","ungrounded"], url:"https://images.unsplash.com/photo-1621905251918-48416bd8575a?w=800&q=80" },
      { id:"surge",    label:"Surge Protection",       emoji:"🛡️", tags:["surge","protector","whole home","protection"], url:"https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=800&q=80" },

      { id:"cabinet",  label:"Under Cabinet Lighting", emoji:"🍳", tags:["under cabinet","kitchen","lighting","cabinet"], url:"https://images.unsplash.com/photo-1556909114-f6e7ad7d3136?w=800&q=80" },
      { id:"smoke",    label:"Smoke / CO Detectors",   emoji:"🚨", tags:["smoke","detector","carbon monoxide","alarm","wired"], url:"https://images.unsplash.com/photo-1558618047-3c8c76f2e949?w=800&q=80" },
      { id:"subpanel", label:"Subpanel Install",       emoji:"🔋", tags:["subpanel","sub panel","panel addition","double tap"], url:"https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=800&q=80" },
      { id:"outdoor",  label:"Outdoor Lighting",       emoji:"🏡", tags:["outdoor","exterior","landscape","pathway","security light"], url:"https://images.unsplash.com/photo-1558618047-3c8c76f2e949?w=800&q=80" },

      { id:"rewire",   label:"Rewire / Wiring",        emoji:"🔩", tags:["rewire","wiring","aluminum","wire replacement","knob and tube"], url:"https://images.unsplash.com/photo-1621905251918-48416bd8575a?w=800&q=80" },
    ];

    function getSuggestedPhotos(optionName, includes) {
      const text = (optionName + " " + (includes||[]).join(" ")).toLowerCase();
      const scored = PHOTO_LIBRARY.map(p => ({ ...p, score: p.tags.filter(t=>text.includes(t)).length }))
        .filter(p=>p.score>0).sort((a,b)=>b.score-a.score);
      return scored.length ? scored : PHOTO_LIBRARY.slice(0,6);
    }

    async function callClaude(system, userText) {
      const body = { model:"claude-sonnet-4-20250514", max_tokens:1500, messages:[{role:"user",content:userText}] };
      if(system) body.system = system;
      try {
        const res = await fetch("/api/claude", {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
        const data = JSON.parse(await res.text());
        if(data.error) return null;
        const raw = data.content?.[0]?.text || "{}";
        return JSON.parse(raw.replace(/```json|```/g,"").trim());
      } catch(e) { return null; }
    }

    async function callHCP(endpoint, method, body) {
      try {
        const res = await fetch("/api/claude?action=hcp", {
          method:"POST", headers:{"Content-Type":"application/json"},
          body:JSON.stringify({endpoint, method:method||"GET", body:body||null}),
        });
        return await res.json();
      } catch(e) { return null; }
    }

    async function attachPhoto(imageUrl, estimateOptionId, caption) {
      try {
        const res = await fetch("/api/claude?action=attach_photo", {
          method:"POST", headers:{"Content-Type":"application/json"},
          body:JSON.stringify({imageUrl, estimateOptionId, caption}),
        });
        return await res.json();
      } catch(e) { return null; }
    }

    const DEFAULT_RULES = [
      {id:1,  trigger:"oxidation on breaker or main breaker",                                               result:"Full panel replacement + service upgrade + outside disconnect + new ground system + permits required"},
      {id:2,  trigger:"rust inside panel or water damage in panel",                                         result:"Full panel replacement + service upgrade + outside disconnect + new ground system + permits required"},
      {id:3,  trigger:"Federal Pacific, Stab-Lok, FPE, Zinsco, Pushmatic, or GE panel",                   result:"Known unsafe panel — full replacement required + outside service upgrade + new ground system"},
      {id:4,  trigger:"fuse box or fuse panel",                                                             result:"Unsafe — full panel upgrade required + outside service + new ground system + permits"},
      {id:5,  trigger:"double tapped breakers and panel is under 150 amps",                                 result:"Full new service upgrade required + outside disconnect + new ground system + permits"},
      {id:6,  trigger:"double tapped breakers and panel is 150 amps or above",                              result:"Offer sub-panel installation OR full new service upgrade + outside disconnect + new ground system + permits"},
      {id:7,  trigger:"panel is full, no open breakers, does not accept tandem breakers, under 150 amps",  result:"Full new service upgrade required + outside disconnect + new ground system + permits"},
      {id:8,  trigger:"panel is full, no open breakers, does not accept tandem breakers, 150 amps or above",result:"Offer sub-panel installation OR full new service upgrade"},
      {id:9,  trigger:"panel is full but accepts tandem breakers",                                          result:"Offer tandem breaker installation as a solution"},
      {id:10, trigger:"any panel upgrade",                                                                  result:"Always includes: new ground system + outside service upgrade + permits required"},
      {id:11, trigger:"permit pulled for panel upgrade",                                                    result:"Outside disconnect is required by code"},
      {id:12, trigger:"aluminum wiring on branch circuits (not ranges, dryers, or AC)",                    result:"Must replace wiring OR install CO/ALR rated devices at every location"},
      {id:13, trigger:"ungrounded outlets or two-prong outlets",                                            result:"Offer GFCI protection at each location OR GFCI breaker in panel"},
      {id:14, trigger:"no GFCI protection in bathroom, kitchen, garage, or exterior",                      result:"Separate line item: GFCI protection required at all wet and exterior locations"},
      {id:15, trigger:"knob and tube wiring",                                                               result:"Only two options: leave it completely alone OR full house rewire"},
      {id:16, trigger:"home built before 1980",                                                             result:"Flag for: bad panel brands, grounding system tied to water pipe/PEX (no continuity), aluminum grounds oxidizing, outdated smoke detectors, outlet/GFCI condition"},
      {id:17, trigger:"grounding system tied to water pipe or PEX plumbing",                               result:"Ground system has lost continuity — new ground system required"},
      {id:18, trigger:"aluminum grounds to water pipe",                                                     result:"Oxidation risk — recommend replacing ground connections"},
      {id:19, trigger:"EV charger request",                                                                 result:"Perform load calculation first — only recommend panel upgrade if load calc shows it cannot handle it"},
      {id:20, trigger:"no smoke detectors or outdated smoke detectors",                                     result:"Recommend: wired smoke/carbon in basement + wireless smoke in each bedroom + wireless combo on all other floors"},
      {id:21, trigger:"any job",                                                                            result:"Always offer whole-home surge protection as an enhancement"},
    ];

    function loadRules() { try{const s=localStorage.getItem("fg_rules");return s?JSON.parse(s):DEFAULT_RULES;}catch(e){return DEFAULT_RULES;} }
    function saveRules(r) { try{localStorage.setItem("fg_rules",JSON.stringify(r));}catch(e){} }

    function buildSystemPrompt(rules, section) {
      const rulesText = rules.map(r=>`- IF: "${r.trigger}" THEN: "${r.result}"`).join("\n");
      const sectionPrompts = {
        request:"Extract what the customer specifically asked for. Return requested_scopes array.",
        safety:"Analyze safety observations. Apply ALL Field Intelligence rules. Return safety_scopes with FULL expanded scopes — think like a master electrician.",
        enhancements:"Extract upgrade opportunities. Always include whole-home surge protection. Return enhancement_scopes array.",
      };
      return `You are a master electrician with 30 years experience helping field technicians build accurate estimates.

FIELD INTELLIGENCE RULES:
${rulesText}

YOUR JOB: ${sectionPrompts[section]}

CRITICAL: Interpret field observations and expand them into full scope of work. Never just transcribe.

Return ONLY valid JSON, no markdown:
${section==="request"?'{"requested_scopes":["scope 1"],"job_facts":{"location":"","quantity":"","panel_condition":"","structural_conditions":[],"home_age":""}}':''}
${section==="safety"?'{"safety_scopes":["scope 1"],"job_facts":{"panel_condition":"","safety_risks":[],"urgency":"","triggers_panel_upgrade":false,"triggers_service_upgrade":false,"requires_permits":false}}':''}
${section==="enhancements"?'{"enhancement_scopes":["scope 1"],"future_opportunities":[]}':''}`;
    }

    const buildOptionsPrompt = (scopes, rules) =>
      `You are a master electrician helping a technician build honest estimate options for a homeowner.
Scopes:
- Customer asked for: ${JSON.stringify(scopes.requested)}
- Safety items: ${JSON.stringify(scopes.safety)}
- Upgrades: ${JSON.stringify(scopes.enhancements)}
Key rules: ${rules.slice(0,10).map(r=>`${r.trigger} -> ${r.result}`).join("; ")}
Create exactly 6 estimate options. Be an advisor, not a salesman. NEVER invent pricing.
Return ONLY valid JSON:
{"options":[{"number":1,"name":"Option name","tier":"essential|safety|comfort|recommended|enhanced|complete","includes":["item 1"],"permits_required":false,"value_statement":"What this means for your home"}]}`;

    const C = {
      bg:"#111318", bgCard:"#1A1D26", bgInner:"#13151C", border:"#262B38",
      cyan:"#00C2E0", cyanSoft:"#003D47",
      amber:"#F59E0B", amberSoft:"#3D2800",
      green:"#00C97A", greenSoft:"#003320",
      red:"#FF4757", redSoft:"rgba(255,71,87,0.12)",
      blue:"#3B82F6", violet:"#7C3AED", teal:"#0D9488",
      orange:"#EA580C", rose:"#E11D48", lime:"#65A30D",
      indigo:"#4F46E5", sky:"#0284C7", emerald:"#059669", fuchsia:"#C026D3",
      white:"#FFFFFF", bright:"#EDF2F7", mid:"#7A8599", dim:"#3D4459",

    const SCOPE_COLORS  = [C.blue,C.violet,C.teal,C.orange,C.rose,C.lime,C.indigo,C.sky,C.emerald,C.fuchsia];
    const OPTION_COLORS = [C.blue,C.teal,C.violet,C.amber,C.green,C.indigo];
    const STEPS = ["tech","job","request","safety","enhancements","review","options"];
    const STEP_META = {
      request:      {num:1,label:"Their Request",emoji:"🏠",color:C.cyan, soft:C.cyanSoft, question:"What did the customer call you to do today?",      sub:"What they asked for — in their own words",            placeholder:"e.g. 6 recessed lights in living room, outlets in garage not working, EV charger..."},
      safety:       {num:2,label:"What You See", emoji:"⚡",color:C.amber,soft:C.amberSoft,question:"What did you find when you got there?",             sub:"Describe what you see — the AI knows what it means",  placeholder:"e.g. panel has oxidation on main breaker, original from 70s, aluminum wiring, no GFCI..."},
      enhancements: {num:3,label:"Good Ideas",   emoji:"💡",color:C.green,soft:C.greenSoft,question:"If this were your house, what would you add?",      sub:"Genuine advice — things that would improve their life",placeholder:"e.g. dimmers, under cabinet lighting, smart switches..."},
    };
    const TIER_LABEL = {essential:"Just What They Asked",safety:"Safety First",comfort:"Added Comfort",recommended:"★ Recommended",enhanced:"Enhanced Home",complete:"The Complete Picture"};

    const h = React.createElement;

    // ── Photo Picker ──────────────────────────────────────────────
    function PhotoPicker({option, onSelect, onClose}) {
      const [tab,setTab]           = useState("curated");
      const [search,setSearch]     = useState("");
      const [results,setResults]   = useState([]);
      const [searching,setSearching] = useState(false);
      const suggested = getSuggestedPhotos(option.name, option.includes);

      const searchUnsplash = async () => {
        if(!search.trim()) return;
        setSearching(true);
        try {
          const res = await fetch(`/api/claude?action=unsplash&q=${encodeURIComponent(search+" electrical finished work")}`);
          const data = await res.json();
          setResults(data.results || []);
        } catch(e) {}
        setSearching(false);
      };

      return h("div",{style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.9)",zIndex:200,display:"flex",flexDirection:"column",animation:"fadeUp 0.2s ease"}},
        h("div",{style:{background:C.bgCard,borderBottom:`1px solid ${C.border}`,padding:"16px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}},
          h("div",null,
            h("div",{style:{fontSize:16,fontWeight:800,color:C.white}},"Add Photo"),

          ),

        ),
        h("div",{style:{display:"flex",background:C.bgInner,borderBottom:`1px solid ${C.border}`,flexShrink:0}},
          [["curated","📚 Suggested"],["all","🗂 All"],["search","🔍 Search"]].map(([t,label])=>
            h("button",{key:t,onClick:()=>setTab(t),style:{flex:1,padding:"12px 0",border:"none",background:tab===t?C.bgCard:"transparent",color:tab===t?C.cyan:C.mid,fontSize:12,fontWeight:700,textTransform:"uppercase",letterSpacing:0.8,borderBottom:tab===t?`2px solid ${C.cyan}`:"2px solid transparent"}},label)
          )
        ),
        h("div",{style:{flex:1,overflowY:"auto",padding:16}},
          (tab==="curated"||tab==="all")&&h("div",null,
            tab==="curated"&&h("div",{style:{fontSize:11,fontWeight:700,color:C.mid,textTransform:"uppercase",letterSpacing:1.5,marginBottom:12}},"Best matches for this option"),
            h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}},
              (tab==="curated"?suggested:PHOTO_LIBRARY).map(photo=>
                h("div",{key:photo.id,onClick:()=>onSelect(photo.url,photo.label),style:{borderRadius:12,overflow:"hidden",cursor:"pointer",boxShadow:"0 2px 12px rgba(0,0,0,0.4)"}},
                  h("div",{style:{position:"relative",paddingTop:"66%",background:C.bgInner}},
                    h("img",{src:photo.url,alt:photo.label,loading:"lazy",style:{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover"}}),
                    h("div",{style:{position:"absolute",bottom:0,left:0,right:0,background:"linear-gradient(transparent,rgba(0,0,0,0.8))",padding:"20px 8px 8px"}},
                      h("div",{style:{fontSize:11,fontWeight:700,color:C.white}},photo.emoji+" "+photo.label)
                    )
                  )
                )
              )
            )
          ),
          tab==="search"&&h("div",null,
            h("div",{style:{display:"flex",gap:8,marginBottom:16}},
              h("input",{value:search,onChange:e=>setSearch(e.target.value),onKeyDown:e=>e.key==="Enter"&&searchUnsplash(),placeholder:"Search finished electrical work...",style:{flex:1,background:C.bgInner,border:`1px solid ${C.border}`,borderRadius:10,padding:"11px 14px",fontSize:14,color:C.bright,outline:"none",caretColor:C.cyan},onFocus:e=>e.target.style.borderColor=C.cyan,onBlur:e=>e.target.style.borderColor=C.border}),
              h("button",{onClick:searchUnsplash,disabled:searching,style:{background:C.cyan,color:C.bg,border:"none",borderRadius:10,padding:"11px 18px",fontSize:13,fontWeight:800}},searching?"...":"Search")
            ),
            searching&&h("div",{style:{textAlign:"center",padding:"32px 0",color:C.mid}},"Searching..."),
            results.length>0&&h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}},
              results.map((photo,i)=>
                h("div",{key:i,onClick:()=>onSelect(photo.urls.regular,photo.alt_description||"Electrical work"),style:{borderRadius:12,overflow:"hidden",cursor:"pointer",boxShadow:"0 2px 12px rgba(0,0,0,0.4)"}},
                  h("div",{style:{position:"relative",paddingTop:"66%",background:C.bgInner}},
                    h("img",{src:photo.urls.small,alt:photo.alt_description,loading:"lazy",style:{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover"}}),
                    h("div",{style:{position:"absolute",bottom:0,left:0,right:0,background:"linear-gradient(transparent,rgba(0,0,0,0.7))",padding:"12px 8px 6px"}},
                      h("div",{style:{fontSize:10,color:"rgba(255,255,255,0.7)"}},photo.user?.name||"Unsplash")
                    )
                  )
                )
              )
            ),
            !searching&&results.length===0&&search&&h("div",{style:{textAlign:"center",padding:"32px 0",color:C.mid}},"No results — try different words")
          )
        )
      );
    }

    // ── Tech Selector ─────────────────────────────────────────────
    function TechSelector({onSelect}) {
      return h("div",{style:{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"32px 20px"}},
        h("div",{style:{width:72,height:72,borderRadius:18,background:`${C.cyan}22`,border:`2px solid ${C.cyan}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:34,marginBottom:20,boxShadow:`0 0 32px ${C.cyan}33`}},"🧭"),
        h("div",{style:{fontSize:28,fontWeight:900,color:C.white,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:2,marginBottom:4}},"FIELD",h("span",{style:{color:C.cyan}},"GUIDE")),
        h("div",{style:{fontSize:11,color:C.mid,textTransform:"uppercase",letterSpacing:3,fontWeight:600,marginBottom:40}},"Electrical Estimating"),
        h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,width:"100%",maxWidth:360}},
          TECHS.map((name,i)=>
            h("button",{key:name,onClick:()=>onSelect(name),style:{background:C.bgCard,border:`1.5px solid ${C.border}`,borderRadius:14,padding:"18px 12px",fontSize:16,fontWeight:800,color:C.bright,textAlign:"center",letterSpacing:0.5,boxShadow:"0 2px 12px rgba(0,0,0,0.3)",animation:"fadeUp 0.25s ease both",animationDelay:`${i*0.05}s`}},name)
          )
        )
      );
    }

    // ── Header ────────────────────────────────────────────────────
    function Header({step, onReset, onIntelligence, jobName, techName}) {
      const steps=[{key:"job",label:"Job",color:C.cyan},{key:"request",label:"Request",color:C.cyan},{key:"safety",label:"Field",color:C.amber},{key:"enhancements",label:"Upgrades",color:C.green},{key:"review",label:"Review",color:C.cyan},{key:"options",label:"Options",color:C.cyan}];
      const idx=STEPS.indexOf(step);
      return h("div",{style:{background:C.bgCard,borderBottom:`1px solid ${C.border}`,position:"sticky",top:0,zIndex:100,boxShadow:"0 4px 24px rgba(0,0,0,0.5)"}},
        h("div",{style:{height:3,background:`linear-gradient(90deg,${C.cyan},${C.amber},${C.green},${C.cyan})`}}),
        h("div",{style:{maxWidth:480,margin:"0 auto",padding:"14px 18px 0"}},
          h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:jobName?6:16}},
            h("div",{style:{display:"flex",alignItems:"center",gap:10}},
              h("div",{style:{width:38,height:38,borderRadius:10,background:`${C.cyan}22`,border:`1px solid ${C.cyan}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}},"🧭"),
              h("div",null,
                h("div",{style:{fontSize:20,fontWeight:900,color:C.white,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:2,lineHeight:1}},"FIELD",h("span",{style:{color:C.cyan}},"GUIDE")),
                h("div",{style:{fontSize:9,color:C.mid,textTransform:"uppercase",letterSpacing:2,fontWeight:600}},"Electrical Estimating")
              )
            ),
            h("div",{style:{display:"flex",gap:8,alignItems:"center"}},
              h("button",{onClick:onIntelligence,style:{background:`${C.amber}18`,border:`1px solid ${C.amber}44`,borderRadius:8,padding:"6px 11px",fontSize:11,fontWeight:700,color:C.amber,textTransform:"uppercase",letterSpacing:0.8}},"🧠 Rules"),
              step!=="job"&&h("button",{onClick:onReset,style:{background:C.bgInner,border:`1px solid ${C.border}`,borderRadius:8,padding:"6px 13px",fontSize:11,fontWeight:700,color:C.mid,textTransform:"uppercase",letterSpacing:0.8}},"← Estimates"),
              h("div",{style:{display:"flex",alignItems:"center",gap:5,background:`${C.green}18`,border:`1px solid ${C.green}44`,borderRadius:8,padding:"6px 10px",fontSize:10,fontWeight:700,color:C.green,textTransform:"uppercase",letterSpacing:1}},
                h("span",{style:{width:5,height:5,borderRadius:"50%",background:C.green,display:"inline-block",animation:"blink 2s infinite"}}),
                techName
              )
            )
          ),
          jobName&&h("div",{style:{fontSize:12,color:C.cyan,fontWeight:600,marginBottom:10,paddingLeft:2}},"📋 "+jobName),
          step!=="job"&&h("div",{style:{display:"flex",gap:6,paddingBottom:14,overflowX:"auto"}},
            steps.filter(s=>s.key!=="job").map((s,i)=>{
              const realIdx=i+2, done=idx>realIdx, active=idx===realIdx;
              return h("div",{key:s.key,style:{display:"flex",alignItems:"center",gap:6,background:active?`${s.color}22`:done?`${s.color}14`:C.bgInner,border:`1.5px solid ${active?s.color:done?s.color+"55":C.border}`,borderRadius:100,padding:"6px 12px",whiteSpace:"nowrap",flexShrink:0,boxShadow:active?`0 0 12px ${s.color}44`:"none",transition:"all 0.3s"}},
                h("div",{style:{width:18,height:18,borderRadius:"50%",background:active?s.color:done?s.color+"cc":C.dim,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:900,color:C.bg,flexShrink:0}},done?"✓":i+1),
                h("span",{style:{fontSize:11,fontWeight:700,color:active?s.color:done?s.color+"cc":C.mid,textTransform:"uppercase",letterSpacing:0.8}},s.label)
              );
            })
          )
        )
      );
    }

    // ── Estimate Picker ───────────────────────────────────────────
    function JobPicker({techName, onSelect}) {
      const [estimates,setEstimates]=useState(null);
      const [loading,setLoading]=useState(true);
      const [error,setError]=useState(null);

      useEffect(()=>{
        (async()=>{
          try {
            // Get tech's employee ID
            const empData = await callHCP("/employees?page_size=100","GET");
            let techId = null;
            if(empData?.employees) {
              const match = empData.employees.find(e=>(e.first_name||"").toLowerCase().trim()===techName.toLowerCase().trim());
              if(match) techId = match.id;
            }

            // Pull today's estimates
            const today = new Date();
            const start = new Date(today.getFullYear(),today.getMonth(),today.getDate(),0,0,0).toISOString();
            const end   = new Date(today.getFullYear(),today.getMonth(),today.getDate(),23,59,59).toISOString();
            const estData = await callHCP(`/estimates?page_size=100&scheduled_start_min=${start}&scheduled_start_max=${end}`,"GET");
            let allEsts = estData?.estimates || (Array.isArray(estData)?estData:[]);

            // Filter by assigned tech
            let filtered = [];
            if(techId) filtered = allEsts.filter(e=>e.assigned_employees?.some(emp=>emp.id===techId));

            // Fetch full details to get customer name for each estimate
            const detailed = await Promise.all(
              filtered.slice(0,20).map(async est=>{
                // Always fetch full details to ensure customer name is present
                const full = await callHCP(`/estimates/${est.id}`,"GET");
                return full || est;
              })
            );

            setEstimates(detailed.filter(Boolean));
          } catch(e) { setError("Could not load estimates from Housecall Pro"); }
          setLoading(false);
        })();
      },[]);

      if(loading) return h("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",gap:16,padding:"64px 0"}},
        h("div",{style:{width:60,height:60,border:`3px solid ${C.border}`,borderTop:`3px solid ${C.cyan}`,borderRadius:"50%",animation:"spin 0.9s linear infinite",boxShadow:`0 0 24px ${C.cyan}44`}}),
        h("div",{style:{fontSize:17,fontWeight:800,color:C.white}},"Loading estimates..."),
        h("div",{style:{fontSize:13,color:C.mid}},`Pulling ${techName}'s estimates from HCP`)
      );

      return h("div",{style:{display:"flex",flexDirection:"column",gap:14}},
        h("div",null,
          h("div",{style:{fontSize:22,fontWeight:900,color:C.white,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:1}},"Today's Estimates"),
          h("div",{style:{fontSize:13,color:C.mid,marginTop:2}},`${techName}'s estimates for today`)
        ),
        error&&h("div",{style:{background:C.redSoft,border:`1px solid ${C.red}33`,borderRadius:12,padding:"14px 16px",color:C.red,fontSize:13,fontWeight:600}},error),
        estimates&&estimates.length===0&&h("div",{style:{background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:16,padding:"32px 20px",textAlign:"center"}},
          h("div",{style:{fontSize:32,marginBottom:12}},"📋"),
          h("div",{style:{fontSize:16,fontWeight:700,color:C.bright,marginBottom:6}},"No estimates scheduled for today"),
          h("div",{style:{fontSize:13,color:C.mid}},"Check Housecall Pro to confirm your schedule")
        ),
        estimates&&estimates.map((est,i)=>{
          const customer=est.customer, address=est.address;
          const firstName = customer?.first_name || "";
          const lastName  = customer?.last_name  || "";
          const name = (firstName||lastName) ? `${firstName} ${lastName}`.trim() : "Unknown Customer";
          const addr = address ? `${address.street}, ${address.city}` : "";
          const estNum = est.estimate_number||est.id?.slice(-6);
          const optCount = est.options?.length||0;
          const status = est.work_status||"";
          return h("div",{key:est.id,onClick:()=>onSelect(est),style:{background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:16,overflow:"hidden",cursor:"pointer",transition:"all 0.2s",boxShadow:"0 2px 12px rgba(0,0,0,0.3)",animation:"fadeUp 0.25s ease both",animationDelay:`${i*0.06}s`}},
            h("div",{style:{height:3,background:`linear-gradient(90deg,${C.cyan},${C.cyan}44)`}}),
            h("div",{style:{padding:"16px 18px",display:"flex",alignItems:"center",gap:14}},
              h("div",{style:{width:48,height:48,borderRadius:12,background:`${C.cyan}18`,border:`1px solid ${C.cyan}33`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}},"🏠"),
              h("div",{style:{flex:1}},
                h("div",{style:{fontSize:16,fontWeight:800,color:C.bright,lineHeight:1.2}},name),
                addr&&h("div",{style:{fontSize:12,color:C.mid,marginTop:3}},addr),
                h("div",{style:{display:"flex",gap:8,marginTop:6,flexWrap:"wrap"}},
                  h("span",{style:{fontSize:10,fontWeight:700,color:C.cyan,background:`${C.cyan}18`,border:`1px solid ${C.cyan}33`,borderRadius:6,padding:"2px 8px",textTransform:"uppercase",letterSpacing:0.8}},`Est #${estNum}`),
                  status&&h("span",{style:{fontSize:10,fontWeight:700,color:C.mid,background:C.bgInner,border:`1px solid ${C.border}`,borderRadius:6,padding:"2px 8px",textTransform:"uppercase",letterSpacing:0.8}},status.replace(/_/g," ")),
                  optCount>0&&h("span",{style:{fontSize:10,fontWeight:700,color:C.amber,background:`${C.amber}18`,border:`1px solid ${C.amber}33`,borderRadius:6,padding:"2px 8px",textTransform:"uppercase",letterSpacing:0.8}},`${optCount} option${optCount>1?"s":""} in HCP`)
                )
              ),
              h("div",{style:{fontSize:20,color:C.dim}},"→")
            )
          );
        })
      );
    }

    // ── Scope Card ────────────────────────────────────────────────
    function ScopeCard({text, index, onRemove}) {
      const bg=SCOPE_COLORS[index%SCOPE_COLORS.length];
      return h("div",{style:{display:"flex",alignItems:"center",background:bg,borderRadius:14,marginBottom:8,overflow:"hidden",boxShadow:`0 4px 16px ${bg}44`,animation:"fadeUp 0.25s ease both",animationDelay:`${index*0.05}s`}},
        h("div",{style:{width:52,height:52,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,0.15)",fontSize:18,color:C.white}},"◈"),
        h("div",{style:{flex:1,padding:"0 12px",fontSize:14,fontWeight:700,color:C.white,lineHeight:1.3}},text),
        onRemove&&h("div",{onClick:onRemove,style:{width:52,height:52,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(255,255,255,0.15)",cursor:"pointer",fontSize:22,color:C.white,fontWeight:300}},"×")
      );
    }

    // ── Input Step ────────────────────────────────────────────────
    function InputStep({meta, onDone, saved, rules}) {
      const [text,setText]=useState(saved?.text||"");
      const [mode,setMode]=useState("type");
      const [isRec,setIsRec]=useState(false);
      const [analyzing,setAna]=useState(false);
      const [extracted,setExt]=useState(saved?.extracted||null);
      const [error,setError]=useState(null);
      const recRef=useRef(null);
      const sectionKey=meta.num===1?"request":meta.num===2?"safety":"enhancements";

      const startVoice=()=>{
        const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
        if(!SR){alert("Voice not available — use Type mode.");return;}
        const r=new SR(); r.continuous=true; r.interimResults=true; r.lang="en-US";
        let final=text;
        r.onresult=(e)=>{let interim="";for(let i=e.resultIndex;i<e.results.length;i++){if(e.results[i].isFinal)final+=e.results[i][0].transcript+" ";else interim+=e.results[i][0].transcript;}setText(final+interim);};
        r.onerror=r.onend=()=>setIsRec(false);
        r.start(); recRef.current=r; setIsRec(true);
      };
      const stopVoice=()=>{recRef.current?.stop();setIsRec(false);};

      const analyze=async()=>{
        if(!text.trim())return; setAna(true); setError(null);
        const parsed=await callClaude(buildSystemPrompt(rules,sectionKey),text);
        if(parsed) setExt(parsed); else setError("Something went wrong — please try again");
        setAna(false);
      };

      const getScopeKey=()=>extracted?Object.keys(extracted).find(k=>k.includes("scopes")):null;
      const getScopes=()=>extracted?(extracted[getScopeKey()]||[]):[];
      const removeScope=(i)=>{const key=getScopeKey();setExt({...extracted,[key]:extracted[key].filter((_,idx)=>idx!==i)});};

      return h("div",{style:{display:"flex",flexDirection:"column",gap:14}},
        h("div",{style:{background:`linear-gradient(135deg,${meta.soft},${meta.soft}88)`,border:`1.5px solid ${meta.color}33`,borderRadius:20,overflow:"hidden",boxShadow:`0 0 32px ${meta.color}22`}},
          h("div",{style:{height:4,background:`linear-gradient(90deg,${meta.color},${meta.color}44)`}}),
          h("div",{style:{padding:"20px 20px 22px"}},
            h("div",{style:{display:"flex",alignItems:"flex-start",gap:12,marginBottom:14}},
              h("div",{style:{width:54,height:54,borderRadius:14,background:`${meta.color}22`,border:`2px solid ${meta.color}55`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,flexShrink:0,boxShadow:`0 0 20px ${meta.color}44`}},meta.emoji),
              h("div",null,
                h("div",{style:{fontSize:10,fontWeight:800,color:meta.color,textTransform:"uppercase",letterSpacing:2,marginBottom:4}},`Step ${meta.num} of 3 — ${meta.label}`),
                h("div",{style:{fontSize:18,fontWeight:800,color:C.white,lineHeight:1.25}},meta.question),
                h("div",{style:{fontSize:12,color:C.mid,marginTop:5,fontStyle:"italic"}},meta.sub)
              )
            ),
            h("div",{style:{display:"flex",background:"rgba(0,0,0,0.3)",borderRadius:12,padding:4,marginBottom:14,border:`1px solid ${C.border}`}},
              [["type","⌨️  Type"],["voice","🎤  Voice"]].map(([m,label])=>
                h("button",{key:m,onClick:()=>setMode(m),style:{flex:1,padding:"10px 0",border:"none",borderRadius:9,background:mode===m?meta.color:"transparent",color:mode===m?C.bg:C.mid,fontWeight:800,fontSize:13,letterSpacing:0.5,transition:"all 0.2s",boxShadow:mode===m?`0 2px 12px ${meta.color}66`:"none"}},label)
              )
            ),
            mode==="voice"
              ?h("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",gap:14}},
                  h("button",{onClick:isRec?stopVoice:startVoice,style:{width:96,height:96,borderRadius:"50%",border:`3px solid ${isRec?"#FF4757":meta.color}`,background:isRec?"rgba(255,71,87,0.15)":`${meta.color}22`,fontSize:36,display:"flex",alignItems:"center",justifyContent:"center",animation:isRec?"recPulse 1.5s ease-in-out infinite":"none",boxShadow:isRec?"none":`0 0 24px ${meta.color}55`,transition:"all 0.25s"}},isRec?"⏹":"🎤"),
                  h("div",{style:{fontSize:13,fontWeight:700,color:isRec?"#FF4757":C.mid,textTransform:"uppercase",letterSpacing:1,animation:isRec?"blink 1s infinite":"none"}},isRec?"● Listening — tap to stop":"Tap to speak"),
                  text&&h("div",{style:{width:"100%",background:"rgba(0,0,0,0.3)",border:`1px solid ${C.border}`,borderRadius:12,padding:"12px 14px",fontSize:13,color:C.mid,lineHeight:1.6,maxHeight:90,overflowY:"auto"}},text)
                )
              :h("textarea",{value:text,onChange:e=>setText(e.target.value),placeholder:meta.placeholder,
                  style:{width:"100%",minHeight:100,background:"rgba(0,0,0,0.3)",border:`1.5px solid ${C.border}`,borderRadius:12,padding:"12px 14px",fontSize:14,color:C.bright,resize:"vertical",outline:"none",lineHeight:1.6,caretColor:meta.color,transition:"border-color 0.2s"},
                  onFocus:e=>e.target.style.borderColor=meta.color,
                  onBlur:e=>e.target.style.borderColor=C.border
                }),
            error&&h("div",{style:{marginTop:10,padding:"10px 14px",background:C.redSoft,border:`1px solid ${C.red}44`,borderRadius:10,fontSize:13,color:C.red,fontWeight:600}},error),
            text&&!extracted&&h("button",{onClick:analyze,disabled:analyzing,style:{marginTop:14,width:"100%",background:analyzing?"rgba(0,0,0,0.2)":meta.color,color:analyzing?C.mid:C.bg,border:"none",borderRadius:12,padding:"15px",fontSize:15,fontWeight:900,letterSpacing:1,textTransform:"uppercase",display:"flex",alignItems:"center",justifyContent:"center",gap:8,boxShadow:analyzing?"none":`0 4px 20px ${meta.color}66`,transition:"all 0.2s"}},
              analyzing?[h("span",{key:"s",style:{animation:"spin 0.8s linear infinite",display:"inline-block"}},"◌")," Analyzing..."]:"◈ Analyze & Extract Scopes"
            )
          )
        ),
        extracted&&h("div",{style:{animation:"fadeUp 0.3s ease"}},
          h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}},
            h("div",{style:{fontSize:11,fontWeight:800,color:meta.color,textTransform:"uppercase",letterSpacing:2}},"Scopes Found — Remove Any That Are Off"),
            h("div",{style:{background:`${meta.color}22`,border:`1px solid ${meta.color}44`,borderRadius:20,padding:"2px 10px",fontSize:11,fontWeight:800,color:meta.color}},getScopes().length)
          ),
          getScopes().length
            ?getScopes().map((s,i)=>h(ScopeCard,{key:i,text:s,index:i,onRemove:()=>removeScope(i)}))
            :h("div",{style:{color:C.mid,fontSize:13,fontStyle:"italic",padding:"12px 0"}},"Nothing extracted — try re-entering your notes"),
          extracted.job_facts&&Object.entries(extracted.job_facts).some(([,v])=>v&&!(Array.isArray(v)&&!v.length)&&v!=="unknown"&&v!=="not mentioned"&&v!==false)&&
            h("div",{style:{background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:14,padding:"14px 16px",marginTop:10}},
              h("div",{style:{fontSize:10,fontWeight:800,color:C.dim,textTransform:"uppercase",letterSpacing:1.5,marginBottom:10}},"Field Intelligence Detected"),
              h("div",{style:{display:"flex",flexWrap:"wrap",gap:6}},
                Object.entries(extracted.job_facts).map(([k,v])=>{
                  if(!v||(Array.isArray(v)&&!v.length)||v==="unknown"||v==="not mentioned"||v===false)return null;
                  const isWarning=k.includes("triggers")||k.includes("requires")||k==="urgency";
                  return h("div",{key:k,style:{background:isWarning?`${C.amber}18`:C.bgInner,border:`1px solid ${isWarning?C.amber+"44":C.border}`,borderRadius:8,padding:"5px 11px",fontSize:12,color:C.mid}},
                    h("span",{style:{color:isWarning?C.amber:C.dim}},k.replace(/_/g," ")+": "),
                    h("span",{style:{color:C.bright,fontWeight:600}},Array.isArray(v)?v.join(", "):v.toString())
                  );
                })
              )
            ),
          h("button",{onClick:()=>onDone({text,extracted}),style:{marginTop:14,width:"100%",background:meta.color,color:C.bg,border:"none",borderRadius:14,padding:"16px",fontSize:16,fontWeight:900,letterSpacing:1,textTransform:"uppercase",boxShadow:`0 6px 24px ${meta.color}55`,transition:"all 0.2s"}},"Looks Good — Next →")
        )
      );
    }

    // ── Review Step ───────────────────────────────────────────────
    function ReviewStep({data, onConfirm}) {
      const sections=[
        {label:"Customer Request",emoji:"🏠",color:C.cyan, scopes:data.request?.extracted?.requested_scopes||[]},
        {label:"Field Findings",  emoji:"⚡",color:C.amber,scopes:data.safety?.extracted?.safety_scopes||[]},
        {label:"Upgrade Ideas",   emoji:"💡",color:C.green,scopes:data.enhancements?.extracted?.enhancement_scopes||[]},
      ];
      const total=sections.reduce((n,s)=>n+s.scopes.length,0);
      return h("div",{style:{display:"flex",flexDirection:"column",gap:14}},
        h("div",{style:{textAlign:"center",paddingBottom:4}},
          h("div",{style:{fontSize:40,marginBottom:8}},"📋"),
          h("div",{style:{fontSize:22,fontWeight:900,color:C.white,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:1}},"Ready to Build?"),
          h("div",{style:{fontSize:14,color:C.mid,marginTop:4}},`${total} scopes across ${sections.filter(s=>s.scopes.length).length} categories`)
        ),
        sections.map((s,si)=>
          h("div",{key:si,style:{background:C.bgCard,border:`1px solid ${s.color}25`,borderRadius:18,overflow:"hidden"}},
            h("div",{style:{display:"flex",alignItems:"center",gap:10,padding:"14px 16px",background:`linear-gradient(90deg,${s.color}18,transparent)`,borderBottom:`1px solid ${s.color}15`}},
              h("span",{style:{fontSize:18}},s.emoji),
              h("span",{style:{fontSize:13,fontWeight:800,color:s.color,textTransform:"uppercase",letterSpacing:1}},s.label),
              h("div",{style:{marginLeft:"auto",background:s.color,color:C.bg,borderRadius:20,padding:"2px 11px",fontSize:12,fontWeight:900}},s.scopes.length)
            ),
            h("div",{style:{padding:"12px 14px 14px"}},
              s.scopes.length
                ?s.scopes.map((sc,i)=>h(ScopeCard,{key:i,text:sc,index:si*10+i}))
                :h("div",{style:{color:C.dim,fontSize:13,fontStyle:"italic"}},"Nothing captured")
            )
          )
        ),
        h("button",{onClick:()=>onConfirm({requested:data.request?.extracted?.requested_scopes||[],safety:data.safety?.extracted?.safety_scopes||[],enhancements:data.enhancements?.extracted?.enhancement_scopes||[]}),style:{width:"100%",background:C.cyan,color:C.bg,border:"none",borderRadius:16,padding:"17px",fontSize:16,fontWeight:900,letterSpacing:1,textTransform:"uppercase",boxShadow:`0 6px 28px ${C.cyan}55`}},"◈ Build My Estimate Options")
      );
    }

    // ── Options Step ──────────────────────────────────────────────
    function OptionsStep({scopes, rules, estimate}) {
      const [options,setOptions]     = useState(null);
      const [loading,setLoading]     = useState(true);
      const [selected,setSelected]   = useState({});
      const [expanded,setExpanded]   = useState(null);
      const [photos,setPhotos]       = useState({});
      const [pickerFor,setPickerFor] = useState(null);
      const [sending,setSending]     = useState(false);
      const [sent,setSent]           = useState(false);
      const [sendError,setSendError] = useState(null);
      const [error,setError]         = useState(null);

      useEffect(()=>{
        (async()=>{
          const parsed=await callClaude(null,buildOptionsPrompt(scopes,rules));
          if(parsed&&parsed.options) setOptions(parsed.options);
          else setError("Could not build options — please try again");
          setLoading(false);
        })();
      },[]);

      const toggleSelect=(num)=>setSelected(prev=>({...prev,[num]:!prev[num]}));
      const selectedCount=Object.values(selected).filter(Boolean).length;

      const handlePhotoSelect=(url,label)=>{
        setPhotos(prev=>({...prev,[pickerFor.number]:{url,label}}));
        setPickerFor(null);
      };

      const removePhoto=(num)=>setPhotos(prev=>{const n={...prev};delete n[num];return n;});

      const sendToHCP=async()=>{
        const toSend=options.filter(o=>selected[o.number]);
        if(!toSend.length)return;
        setSending(true); setSendError(null);
        try {
          for(const opt of toSend) {
            const r = await callHCP(`/estimates/${estimate.id}/options`,"POST",{
              name:opt.name,
              line_items:opt.includes.map(item=>({
                name:item,
                description:opt.permits_required?"Permits may be required":"",
                unit_price:0,
                quantity:1,
              }))
            });
            const optionId = r?.id || r?.estimate_option_id;
            const photo = photos[opt.number];
            if(photo && optionId) {
              await attachPhoto(photo.url, optionId, photo.label);
            }
          }
          setSent(true);
        } catch(e) { setSendError("Failed to send — please try again"); }
        setSending(false);
      };

      if(loading) return h("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",gap:16,padding:"64px 0"}},
        h("div",{style:{width:60,height:60,border:`3px solid ${C.border}`,borderTop:`3px solid ${C.cyan}`,borderRadius:"50%",animation:"spin 0.9s linear infinite",boxShadow:`0 0 24px ${C.cyan}44`}}),
        h("div",{style:{fontSize:17,fontWeight:800,color:C.white}},"Building options..."),
        h("div",{style:{fontSize:13,color:C.mid}},"Applying Field Intelligence rules...")
      );

      if(sent) return h("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",gap:16,padding:"48px 0",animation:"fadeUp 0.4s ease"}},
        h("div",{style:{width:80,height:80,borderRadius:"50%",background:`${C.green}22`,border:`3px solid ${C.green}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:36,boxShadow:`0 0 32px ${C.green}44`}},"✓"),
        h("div",{style:{fontSize:22,fontWeight:900,color:C.white,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:1}},"Sent to Housecall Pro"),
        h("div",{style:{fontSize:14,color:C.mid,textAlign:"center",lineHeight:1.6}},`${selectedCount} option${selectedCount>1?"s":""} added to Estimate #${estimate.estimate_number}`),
        h("div",{style:{fontSize:13,color:C.green,fontWeight:600,textAlign:"center"}},"Open HCP to review and present to customer")
      );

      if(error) return h("div",{style:{padding:"32px 0",textAlign:"center",color:C.red,fontSize:15,fontWeight:600}},error);

      return h("div",{style:{display:"flex",flexDirection:"column",gap:10}},
        pickerFor&&h(PhotoPicker,{option:pickerFor,onSelect:handlePhotoSelect,onClose:()=>setPickerFor(null)}),

        h("div",{style:{paddingBottom:6}},
          h("div",{style:{fontSize:22,fontWeight:900,color:C.white,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:1}},`${options?.length} Options Ready`),
          h("div",{style:{fontSize:13,color:C.mid,marginTop:2}},"Select options · Add photos · Send to HCP")
        ),

        h("div",{style:{background:`${C.cyan}12`,border:`1px solid ${C.cyan}33`,borderRadius:12,padding:"12px 16px",marginBottom:4}},
          h("div",{style:{fontSize:11,fontWeight:700,color:C.cyan,textTransform:"uppercase",letterSpacing:1.5,marginBottom:4}},"Adding to Estimate"),
          h("div",{style:{fontSize:14,fontWeight:700,color:C.bright}},
            (estimate.customer?.first_name||estimate.customer?.last_name)
              ? `${estimate.customer.first_name||""} ${estimate.customer.last_name||""}`.trim()
              : "Customer"
            ," — Est #"+estimate.estimate_number
          ),
          estimate.address&&h("div",{style:{fontSize:12,color:C.mid}},`${estimate.address.street}, ${estimate.address.city}`)
        ),

        options?.map((opt,oi)=>{
          const color=OPTION_COLORS[oi%OPTION_COLORS.length];
          const isSel=!!selected[opt.number];
          const isExp=expanded===opt.number;
          const photo=photos[opt.number];

          return h("div",{key:opt.number,style:{borderRadius:18,overflow:"hidden",border:`2px solid ${isSel?color:C.border}`,boxShadow:isSel?`0 6px 28px ${color}44`:"0 2px 12px rgba(0,0,0,0.3)",transition:"all 0.25s ease",animation:"fadeUp 0.3s ease both",animationDelay:`${oi*0.06}s`}},

            // Main row
            h("div",{style:{display:"flex",alignItems:"center",background:color,minHeight:62}},
              h("div",{onClick:()=>toggleSelect(opt.number),style:{width:62,height:62,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",background:isSel?"rgba(255,255,255,0.25)":"rgba(0,0,0,0.2)",cursor:"pointer"}},
                h("div",{style:{width:28,height:28,borderRadius:6,background:isSel?C.white:"rgba(255,255,255,0.25)",border:`2px solid ${isSel?"transparent":"rgba(255,255,255,0.5)"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,color:isSel?color:"transparent",fontWeight:900,transition:"all 0.2s"}},isSel?"✓":"")
              ),
              h("div",{onClick:()=>setExpanded(isExp?null:opt.number),style:{flex:1,padding:"0 14px",cursor:"pointer"}},
                h("div",{style:{fontSize:16,fontWeight:800,color:C.white,lineHeight:1.2}},opt.name),
                h("div",{style:{display:"flex",alignItems:"center",gap:8,marginTop:3,flexWrap:"wrap"}},
                  h("div",{style:{fontSize:10,fontWeight:700,color:"rgba(255,255,255,0.7)",textTransform:"uppercase",letterSpacing:1.2}},TIER_LABEL[opt.tier]||opt.tier),
                  opt.permits_required&&h("div",{style:{fontSize:9,fontWeight:700,color:C.amber,background:"rgba(0,0,0,0.3)",borderRadius:4,padding:"2px 6px",textTransform:"uppercase",letterSpacing:0.8}},"Permits"),
                  photo&&h("div",{style:{fontSize:9,fontWeight:700,color:"#00E57A",background:"rgba(0,0,0,0.3)",borderRadius:4,padding:"2px 6px",textTransform:"uppercase",letterSpacing:0.8}},"📸 Photo")
                )
              ),
              h("div",{onClick:()=>setExpanded(isExp?null:opt.number),style:{width:44,height:62,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,0.15)",cursor:"pointer",fontSize:16,color:"rgba(255,255,255,0.7)"}},isExp?"▲":"▼")
            ),

            // Expanded detail
            isExp&&h("div",{style:{background:C.bgCard,borderTop:`1px solid ${color}33`,padding:"14px 16px",animation:"fadeUp 0.2s ease"}},
              h("div",{style:{fontSize:13,color:C.mid,fontStyle:"italic",marginBottom:12,lineHeight:1.55}},`"${opt.value_statement}"`),
              h("div",{style:{fontSize:10,fontWeight:800,color:C.dim,textTransform:"uppercase",letterSpacing:1.5,marginBottom:8}},"What's Included"),
              opt.includes?.map((item,i)=>
                h("div",{key:i,style:{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",marginBottom:6,background:`${color}14`,border:`1px solid ${color}30`,borderRadius:10}},
                  h("div",{style:{width:6,height:6,borderRadius:"50%",background:color,flexShrink:0}}),
                  h("span",{style:{fontSize:13,color:C.bright,fontWeight:600}},item)
                )
              ),

              // Photo section
              h("div",{style:{marginTop:14,borderTop:`1px solid ${C.border}`,paddingTop:14}},
                h("div",{style:{fontSize:10,fontWeight:800,color:C.dim,textTransform:"uppercase",letterSpacing:1.5,marginBottom:10}},"📸 Finished Work Photo"),
                photo
                  ? h("div",{style:{position:"relative"}},
                      h("img",{src:photo.url,alt:photo.label,style:{width:"100%",height:160,objectFit:"cover",borderRadius:10,display:"block"}}),
                      h("div",{style:{position:"absolute",top:8,right:8,display:"flex",gap:6}},
                        h("button",{onClick:()=>setPickerFor(opt),style:{background:"rgba(0,0,0,0.75)",border:`1px solid ${C.border}`,borderRadius:6,padding:"5px 10px",fontSize:11,fontWeight:700,color:C.white}},"Change"),
                        h("button",{onClick:()=>removePhoto(opt.number),style:{background:"rgba(255,71,87,0.8)",border:"none",borderRadius:6,padding:"5px 10px",fontSize:11,fontWeight:700,color:C.white}},"Remove")
                      ),
                      h("div",{style:{position:"absolute",bottom:8,left:8,background:"rgba(0,0,0,0.7)",borderRadius:6,padding:"3px 8px",fontSize:11,color:C.white}},photo.label)
                    )
                  : h("button",{onClick:()=>setPickerFor(opt),style:{width:"100%",background:`${color}14`,border:`2px dashed ${color}55`,borderRadius:10,padding:"16px",fontSize:13,fontWeight:700,color:color,textTransform:"uppercase",letterSpacing:0.8,cursor:"pointer"}},"+ Add Photo")
              )
            )
          );
        }),

        sendError&&h("div",{style:{padding:"10px 14px",background:C.redSoft,border:`1px solid ${C.red}44`,borderRadius:10,fontSize:13,color:C.red,fontWeight:600}},sendError),

        selectedCount>0&&h("button",{onClick:sendToHCP,disabled:sending,style:{marginTop:8,width:"100%",background:sending?"rgba(0,0,0,0.2)":C.amber,color:sending?C.mid:C.bg,border:"none",borderRadius:16,padding:"17px",fontSize:16,fontWeight:900,letterSpacing:1,textTransform:"uppercase",boxShadow:sending?"none":`0 6px 28px ${C.amber}55`,animation:"fadeUp 0.25s ease",display:"flex",alignItems:"center",justifyContent:"center",gap:8}},
          sending?[h("span",{key:"s",style:{animation:"spin 0.8s linear infinite",display:"inline-block"}},"◌")," Sending to Housecall Pro..."]:
          `📋 Add ${selectedCount} Option${selectedCount>1?"s":""} to Housecall Pro`
        )
      );
    }

    // ── Field Intelligence ────────────────────────────────────────
    function IntelligenceScreen({rules, onBack, onSave}) {
      const [localRules,setLocalRules]=useState(rules);
      const [newTrigger,setNewTrigger]=useState("");
      const [newResult,setNewResult]=useState("");
      const [showAdd,setShowAdd]=useState(false);
      const addRule=()=>{
        if(!newTrigger.trim()||!newResult.trim())return;
        const updated=[...localRules,{id:Date.now(),trigger:newTrigger.trim(),result:newResult.trim()}];
        setLocalRules(updated); onSave(updated);
        setNewTrigger(""); setNewResult(""); setShowAdd(false);
      };
      const deleteRule=(id)=>{const u=localRules.filter(r=>r.id!==id);setLocalRules(u);onSave(u);};
      return h("div",{style:{minHeight:"100vh",background:C.bg}},
        h("div",{style:{background:C.bgCard,borderBottom:`1px solid ${C.border}`,padding:"16px 18px",display:"flex",alignItems:"center",gap:12,position:"sticky",top:0,zIndex:100}},
          h("div",{style:{height:3,background:`linear-gradient(90deg,${C.amber},${C.amber}44)`,position:"absolute",top:0,left:0,right:0}}),
          h("button",{onClick:onBack,style:{background:C.bgInner,border:`1px solid ${C.border}`,borderRadius:8,padding:"7px 13px",fontSize:13,fontWeight:700,color:C.mid,marginTop:3}},"← Back"),
          h("div",null,
            h("div",{style:{fontSize:18,fontWeight:900,color:C.white,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:1}},"🧠 Field Intelligence"),
            h("div",{style:{fontSize:10,color:C.amber,textTransform:"uppercase",letterSpacing:2,fontWeight:700}},"Electrical Rules Engine")
          )
        ),
        h("div",{style:{maxWidth:480,margin:"0 auto",padding:"20px 16px 48px"}},
          h("div",{style:{background:`${C.amber}12`,border:`1px solid ${C.amber}33`,borderRadius:14,padding:"14px 16px",marginBottom:20}},
            h("div",{style:{fontSize:13,color:C.amber,fontWeight:600,lineHeight:1.6}},"These rules teach FieldGuide to think like a master electrician. When a tech describes what they see, the AI applies these rules automatically.")
          ),
          h("button",{onClick:()=>setShowAdd(!showAdd),style:{width:"100%",background:showAdd?C.bgCard:`${C.green}18`,border:`1px solid ${showAdd?C.border:C.green}`,borderRadius:12,padding:"13px",fontSize:14,fontWeight:700,color:showAdd?C.mid:C.green,marginBottom:16,textTransform:"uppercase",letterSpacing:0.8}},showAdd?"Cancel":"+ Add New Rule"),
          showAdd&&h("div",{style:{background:C.bgCard,border:`1px solid ${C.green}33`,borderRadius:14,padding:16,marginBottom:16,animation:"fadeUp 0.2s ease"}},
            h("div",{style:{fontSize:11,fontWeight:700,color:C.green,textTransform:"uppercase",letterSpacing:1.5,marginBottom:8}},"When tech sees..."),
            h("textarea",{value:newTrigger,onChange:e=>setNewTrigger(e.target.value),placeholder:"e.g. double tapped breakers on a 200 amp panel",style:{width:"100%",minHeight:70,background:C.bgInner,border:`1px solid ${C.border}`,borderRadius:10,padding:"10px 12px",fontSize:13,color:C.bright,resize:"vertical",outline:"none",marginBottom:12},onFocus:e=>e.target.style.borderColor=C.green,onBlur:e=>e.target.style.borderColor=C.border}),
            h("div",{style:{fontSize:11,fontWeight:700,color:C.green,textTransform:"uppercase",letterSpacing:1.5,marginBottom:8}},"AI should include..."),
            h("textarea",{value:newResult,onChange:e=>setNewResult(e.target.value),placeholder:"e.g. Offer sub-panel installation since panel is 150A+",style:{width:"100%",minHeight:70,background:C.bgInner,border:`1px solid ${C.border}`,borderRadius:10,padding:"10px 12px",fontSize:13,color:C.bright,resize:"vertical",outline:"none",marginBottom:12},onFocus:e=>e.target.style.borderColor=C.green,onBlur:e=>e.target.style.borderColor=C.border}),
            h("button",{onClick:addRule,style:{width:"100%",background:C.green,color:C.bg,border:"none",borderRadius:10,padding:"12px",fontSize:14,fontWeight:900,letterSpacing:0.8,textTransform:"uppercase",boxShadow:`0 4px 16px ${C.green}44`}},"Save Rule")
          ),
          h("div",{style:{fontSize:11,fontWeight:700,color:C.dim,textTransform:"uppercase",letterSpacing:1.5,marginBottom:12}},`${localRules.length} Active Rules`),
          localRules.map((rule,i)=>
            h("div",{key:rule.id,style:{background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:14,marginBottom:10,overflow:"hidden",animation:"fadeUp 0.2s ease both",animationDelay:`${i*0.03}s`}},
              h("div",{style:{padding:"12px 14px",borderBottom:`1px solid ${C.border}`}},
                h("div",{style:{fontSize:10,fontWeight:700,color:C.amber,textTransform:"uppercase",letterSpacing:1.2,marginBottom:5}},"When tech sees..."),
                h("div",{style:{fontSize:13,color:C.bright,fontWeight:600,lineHeight:1.4}},rule.trigger)
              ),
              h("div",{style:{padding:"12px 14px",background:`${C.green}08`}},
                h("div",{style:{fontSize:10,fontWeight:700,color:C.green,textTransform:"uppercase",letterSpacing:1.2,marginBottom:5}},"AI includes..."),
                h("div",{style:{fontSize:13,color:C.mid,lineHeight:1.4}},rule.result)
              ),
              h("div",{style:{padding:"8px 14px",borderTop:`1px solid ${C.border}`,display:"flex",justifyContent:"flex-end"}},
                h("button",{onClick:()=>deleteRule(rule.id),style:{background:"rgba(255,71,87,0.12)",border:`1px solid ${C.red}33`,borderRadius:6,padding:"4px 12px",fontSize:11,fontWeight:700,color:C.red,textTransform:"uppercase",letterSpacing:0.8}},"Remove")
              )
            )
          )
        )
      );
    }

    // ── App Root ──────────────────────────────────────────────────
    function FieldGuide() {
      const [tech,setTech]           = useState(null);
      const [step,setStep]           = useState("job");
      const [data,setData]           = useState({});
      const [scopes,setScopes]       = useState(null);
      const [estimate,setEstimate]   = useState(null);
      const [rules,setRules]         = useState(loadRules);
      const [showIntel,setShowIntel] = useState(false);

      const handleStep=(key,result)=>{
        setData(prev=>({...prev,[key]:result}));
        if(key==="request")           setStep("safety");
        else if(key==="safety")       setStep("enhancements");
        else if(key==="enhancements") setStep("review");
      };
      const selectEstimate=(est)=>{setEstimate(est);setStep("request");};
      const handleSaveRules=(u)=>{setRules(u);saveRules(u);};
      const reset=()=>{setStep("job");setData({});setScopes(null);setEstimate(null);};

      const jobName = estimate
        ? ((estimate.customer?.first_name||"")+" "+(estimate.customer?.last_name||"")).trim()+` — Est #${estimate.estimate_number}`
        : null;

      if(!tech) return h(TechSelector,{onSelect:setTech});
      if(showIntel) return h(IntelligenceScreen,{rules,onBack:()=>setShowIntel(false),onSave:handleSaveRules});

      return h("div",{style:{minHeight:"100vh",background:C.bg}},
        h(Header,{step,onReset:reset,onIntelligence:()=>setShowIntel(true),jobName,techName:tech}),
        h("div",{style:{maxWidth:480,margin:"0 auto",padding:"20px 16px 56px"}},
          step==="job"          && h(JobPicker,{techName:tech,onSelect:selectEstimate}),
          step==="request"      && h(InputStep,{meta:STEP_META.request,      onDone:r=>handleStep("request",r),      saved:data.request,      rules}),
          step==="safety"       && h(InputStep,{meta:STEP_META.safety,       onDone:r=>handleStep("safety",r),       saved:data.safety,       rules}),
          step==="enhancements" && h(InputStep,{meta:STEP_META.enhancements, onDone:r=>handleStep("enhancements",r), saved:data.enhancements, rules}),
          step==="review"       && h(ReviewStep,{data,onConfirm:s=>{setScopes(s);setStep("options");}}),
          step==="options"      && scopes && h(OptionsStep,{scopes,rules,estimate})
        )
      );
    }

    createRoot(document.getElementById("root")).render(h(FieldGuide,null));
  </script>
</body>
</html>
