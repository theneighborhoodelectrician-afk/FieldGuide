        document.body.appendChild(d);
      }
      d.textContent += "JS ERROR: " + msg + (src ? "\n@ " + src + " line " + line : "") + "\n\n";
    };
    window.addEventListener("unhandledrejection", function(e) {
      var d = document.getElementById("fg-err");
      if (!d) {
        d = document.createElement("div");
        d.id = "fg-err";
        d.style.cssText = "position:fixed;bottom:0;left:0;right:0;background:#1a0a0a;color:#ff667a;font-family:monospace;font-size:13px;padding:16px;z-index:9999;white-space:pre-wrap;max-height:50vh;overflow-y:auto;border-top:2px solid #ff667a";

    });

    function loadRules() {
      try {
        const saved = localStorage.getItem("fg_rules");
        return saved ? JSON.parse(saved) : DEFAULT_RULES;
      } catch { return DEFAULT_RULES; }
    }

    function saveRules(rules) {
      try { localStorage.setItem("fg_rules", JSON.stringify(rules)); } catch {}
    }

    function safeJsonParse(value, fallback = null) {
      try { return JSON.parse(value); } catch { return fallback; }
    }

    async function requestJson(url, options = {}) {
      const response = await fetch(url, options);
      const text = await response.text();
      const data = safeJsonParse(text, null);
      if (!response.ok) throw new Error(data?.error || response.statusText || "Request failed");
      return data;
    }

    async function callClaude(system, userText) {
      const body = {
        model: "claude-sonnet-4-20250514",
        max_tokens: 4000,
        messages: [{ role: "user", content: userText }]
      };
      if (system) body.system = system;
      try {
        const data = await requestJson("/api/claude", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });
        const rawText = data?.content?.[0]?.text || "";
        const cleaned = rawText.replace(/```json|```/g, "").trim();
        return safeJsonParse(cleaned, null);
      } catch { return null; }
    }

    async function callHCP(endpoint, method = "GET", body = null) {
      try {
        return await requestJson("/api/claude?action=hcp", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ endpoint, method, body })
        });
      } catch { return null; }

        ].join("\n"),
        safety: [
          "SECTION: What is directly connected to what they called for.",
          "These are findings logically tied to the original ask — not random upsells.",
          "Apply ALL FIELD INTELLIGENCE RULES: if a trigger condition appears in the notes, the result MUST be included as a scope.",
          "Write each as a clear action (e.g. 'Panel has double-tapped breakers — sub-panel or full service upgrade required').",
          "Do NOT include general enhancements or positives here — only connected findings and rule-triggered scopes.",

FIELD INTELLIGENCE RULES (apply these when triggers appear in the tech's notes):
${rulesText}

${sectionGuides[section]}

    function buildPromptPricebookItems(items, pricingMode) {
      return items
        .filter((item) => item?.pricing?.[pricingMode] != null)
        .map((item) => ({
          id: item.id,
          name: item.name,
          category: item.category,
          description: item.description,
          price: item.pricing[pricingMode]
        }));
    }

    // Resolve a pricebook item by id with fuzzy fallback
    function resolveItem(match, pricebookItems, pricingMode) {
      const byId = Object.fromEntries(pricebookItems.map((i) => [i.id, i]));
      const byName = Object.fromEntries(pricebookItems.map((i) => [i.name.toLowerCase().trim(), i]));

      // 1. Exact id
      let item = byId[match?.id];
      // 2. Cleaned id (normalize punctuation)
      if (!item) {
        const cleanId = String(match?.id || "").toLowerCase().replace(/[^a-z0-9]/g, "-").replace(/-+/g, "-");
        item = byId[cleanId];
      }
      // 3. Exact name match
      if (!item && match?.name) item = byName[String(match.name).toLowerCase().trim()];
      // 4. Partial name match
      if (!item && match?.name) {
        const needle = String(match.name).toLowerCase();
        item = pricebookItems.find((pb) =>
          pb.name.toLowerCase().includes(needle) || needle.includes(pb.name.toLowerCase())
        );
      }

      if (!item || item?.pricing?.[pricingMode] == null) return null;
      return {
        id: item.id,
        name: item.name,
        description: item.description || "",
        price: item.pricing[pricingMode],
        quantity: Math.max(1, Number(match?.quantity) || 1)
      };
    }

    function getOptionId(response) {
      if (!response || typeof response !== "object") return null;
      if (typeof response.estimate_option_id === "string") return response.estimate_option_id;
      if (typeof response.id === "string") return response.id;
      for (const value of Object.values(response)) {
        if (value && typeof value === "object" && !Array.isArray(value)) {
          const nested = getOptionId(value);
          if (nested) return nested;
        }
      }
      return null;
    }

    function dollarsToCents(amount) {
      return Math.round((Number(amount) || 0) * 100);
    }

    function getSuggestedPhotos(optionName, includes) {
      const haystack = `${optionName} ${(includes || []).join(" ")}`.toLowerCase();
      const scored = PHOTO_LIBRARY
        .map((photo) => ({ ...photo, score: photo.tags.filter((tag) => haystack.includes(tag)).length }))
        .sort((a, b) => b.score - a.score);
      return scored.some((p) => p.score > 0) ? scored.filter((p) => p.score > 0) : PHOTO_LIBRARY;
    }

      return h("button", {
        type: "button", onClick,
        style: {
          padding: "10px 14px", borderRadius: "12px",
          background: selected ? "rgba(255,255,255,0.12)" : "rgba(255,255,255,0.04)",
          border: selected ? "1px solid var(--border-strong)" : "1px solid var(--border)",
          color: selected ? "var(--text)" : "var(--text-muted)",
          fontWeight: 700, ...style
        }
      }, children);
    }

    function Badge({ children, tone = "default" }) {
      const toneMap = {
        default: { bg: "rgba(255,255,255,0.06)", color: "var(--text-muted)", border: "var(--border)" },
        cyan:    { bg: "var(--cyan-deep)",  color: "var(--cyan)",  border: "rgba(50,212,255,0.24)" },
        amber:   { bg: "var(--amber-deep)", color: "var(--amber)", border: "rgba(255,176,32,0.24)" },
        green:   { bg: "var(--green-deep)", color: "var(--green)", border: "rgba(49,215,140,0.24)" }
      };
      const t = toneMap[tone] || toneMap.default;
      return h("span", {
        style: {
          display: "inline-flex", alignItems: "center", gap: 6,
          padding: "4px 9px", borderRadius: 999,
          background: t.bg, border: `1px solid ${t.border}`, color: t.color,
          fontSize: 11, fontWeight: 800, textTransform: "uppercase", letterSpacing: "0.08em"
        }
      }, children);
    }

    function EmptyState({ title, body, emoji = "📋" }) {
      return h("div", { style: { ...shellCardStyle(), padding: "28px 20px", textAlign: "center" } }, [
        h("div", { key: "emoji", style: { fontSize: 34, marginBottom: 10 } }, emoji),
        h("div", { key: "title", style: { fontSize: 18, fontWeight: 800, marginBottom: 6 } }, title),
        h("div", { key: "body", style: { fontSize: 14, color: "var(--text-muted)", lineHeight: 1.6 } }, body)
      ]);
    }

    function LoadingState({ title, body }) {
      return h("div", { style: { display: "flex", flexDirection: "column", alignItems: "center", gap: 14, padding: "64px 0" } }, [
        h("div", {
          key: "spinner",
          style: {
            width: 58, height: 58, borderRadius: "50%",
            border: "3px solid rgba(255,255,255,0.1)", borderTopColor: "var(--cyan)",
            animation: "spin 0.9s linear infinite"
          }
        }),
        h("div", { key: "title", style: { fontSize: 18, fontWeight: 800 } }, title),
        h("div", { key: "body",  style: { fontSize: 14, color: "var(--text-muted)" } }, body)
      ]);
    }

    function ScopeChip({ text, color, onRemove }) {
      return h("div", {
        style: {
          display: "flex", alignItems: "stretch", gap: 0, marginBottom: 10,
          borderRadius: "16px", overflow: "hidden",
          boxShadow: "var(--shadow-md)", animation: "floatUp 0.22s ease"
        }
      }, [
        h("div", { key: "stripe", style: { width: 10, background: color } }),
        h("div", {
          key: "body",
          style: { flex: 1, padding: "14px 16px", background: "rgba(255,255,255,0.06)", fontSize: 14, lineHeight: 1.45, fontWeight: 700 }
        }, text),
        onRemove ? h("button", {
          key: "remove", type: "button", onClick: onRemove,
          style: { width: 54, background: "rgba(255,255,255,0.08)", color: "var(--text)", fontSize: 24 }
        }, "×") : null
      ]);
    }

    // ─── TECH SELECTOR ───────────────────────────────────────────────────────────

    function TechSelector({ onSelect }) {
      return h("div", {
        style: { minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: "28px 18px" }
      }, pageWrap([
        h("div", {
          key: "hero",
          style: { ...shellCardStyle(), padding: "26px 22px", marginBottom: 18, overflow: "hidden", position: "relative" }
        }, [
          h("div", { key: "orb", style: { position: "absolute", inset: "auto -40px -40px auto", width: 120, height: 120, borderRadius: "50%", background: "radial-gradient(circle, rgba(50,212,255,0.22), transparent 70%)" } }),
          h("div", { key: "eyebrow", style: { fontSize: 11, color: "var(--cyan)", fontWeight: 800, letterSpacing: "0.18em", textTransform: "uppercase", marginBottom: 10 } }, "Electrical Estimating"),
          h("div", { key: "title", style: { fontFamily: '"Barlow Condensed", sans-serif', fontWeight: 900, fontSize: 38, lineHeight: 0.95, letterSpacing: "0.06em" } }, [
            "FIELD", h("span", { key: "g", style: { color: "var(--cyan)" } }, "GUIDE")
          ]),
          h("p", { key: "copy", style: { margin: "12px 0 0", fontSize: 15, lineHeight: 1.6, color: "var(--text-muted)", maxWidth: 360 } },
            "Faster estimate building for field techs: capture the ask, decode the field conditions, and send clean options into Housecall Pro.")
        ]),
        h("div", {
          key: "list",
          style: { display: "grid", gridTemplateColumns: "repeat(2, minmax(0, 1fr))", gap: 12 }
        }, TECHS.map((tech, index) => h("button", {
          key: tech, type: "button", onClick: () => onSelect(tech),
          style: {
            ...shellCardStyle(), padding: "18px 14px", textAlign: "center",
            color: "var(--text)", fontWeight: 800, fontSize: 16,
            animation: "floatUp 0.24s ease both", animationDelay: `${index * 0.04}s`
          }
        }, tech)))
      ]));
    }

    // ─── HEADER ──────────────────────────────────────────────────────────────────

    function Header({ techName, jobName, step, onReset, onOpenRules }) {
      const labels = [
        { key: "request", title: "Request" },
        { key: "safety",  title: "Field"   },
        { key: "enhancements", title: "Ideas" },
        { key: "review",  title: "Review"  },
        { key: "options", title: "Options" }
      ];
      const stepIndex = labels.findIndex((item) => item.key === step);
      const visible = step !== "job";

      return h("header", {
        style: { position: "sticky", top: 0, zIndex: 20, backdropFilter: "blur(16px)", background: "rgba(17,21,28,0.76)", borderBottom: "1px solid rgba(255,255,255,0.06)" }
      }, pageWrap([
        h("div", { key: "top", style: { paddingTop: 14, paddingBottom: visible ? 10 : 14, display: "flex", alignItems: "center", gap: 12 } }, [
          h("div", { key: "logo", style: { width: 42, height: 42, borderRadius: 14, display: "grid", placeItems: "center", background: "linear-gradient(135deg, rgba(50,212,255,0.22), rgba(50,212,255,0.06))", border: "1px solid rgba(50,212,255,0.22)" } }, "🧭"),
          h("div", { key: "name", style: { flex: 1, minWidth: 0 } }, [
            h("div", { key: "brand", style: { fontFamily: '"Barlow Condensed", sans-serif', fontWeight: 900, fontSize: 24, lineHeight: 1, letterSpacing: "0.08em" } }, ["FIELD", h("span", { key: "g", style: { color: "var(--cyan)" } }, "GUIDE")]),
            h("div", { key: "job", style: { marginTop: 4, fontSize: 12, color: "var(--text-muted)", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" } }, jobName || "Electrical Estimating")
          ]),
          h("div", { key: "actions", style: { display: "flex", gap: 8, alignItems: "center" } }, [
            h(SoftButton, { key: "photos", onClick: onOpenPhotos, style: { color: "var(--cyan)" } }, "Photos"),
            h(SoftButton, { key: "rules",  onClick: onOpenRules,  style: { color: "var(--amber)" } }, "Rules"),
            visible ? h(SoftButton, { key: "reset", onClick: onReset }, "Jobs") : null
          ])
        ]),
        h("div", { key: "bottom", style: { display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10, paddingBottom: visible ? 12 : 0 } }, [
          h(Badge, { key: "tech", tone: "green" }, techName),
          visible ? h("div", {
            key: "steps",
            style: { display: "flex", gap: 8, overflowX: "auto", paddingBottom: 2 }
          }, labels.map((item, index) => {
            const active = step === item.key;
            const done = stepIndex > index;
            return h("div", {
              key: item.key,
              style: {
                display: "inline-flex", alignItems: "center", gap: 7,
                whiteSpace: "nowrap", padding: "6px 10px", borderRadius: 999,
                background: active ? "rgba(50,212,255,0.14)" : "rgba(255,255,255,0.04)",
                border: active ? "1px solid rgba(50,212,255,0.22)" : "1px solid var(--border)"
              }
            }, [
              h("span", { key: "dot", style: { width: 18, height: 18, borderRadius: "50%", display: "grid", placeItems: "center", background: active ? "var(--cyan)" : done ? "var(--green)" : "rgba(255,255,255,0.14)", color: active || done ? "#091018" : "var(--text-muted)", fontSize: 11, fontWeight: 900 } }, done ? "✓" : String(index + 1)),
              h("span", { key: "label", style: { fontSize: 11, fontWeight: 800, letterSpacing: "0.08em", textTransform: "uppercase", color: active ? "var(--cyan)" : done ? "var(--green)" : "var(--text-muted)" } }, item.title)
            ]);
          })) : null
        ])
      ]));
    }

    // ─── JOB PICKER ──────────────────────────────────────────────────────────────

    function JobPicker({ techName, onSelect }) {
      const [loading, setLoading] = useState(true);
      const [error, setError]     = useState("");
      const [estimates, setEstimates] = useState([]);

      useEffect(() => {
        let live = true;
        (async () => {
          setLoading(true); setError("");
          const employeeData = await callHCP("/employees?page_size=100", "GET");
          const employee = employeeData?.employees?.find((item) =>
            (item.first_name || "").trim().toLowerCase() === techName.toLowerCase()
          );
          if (!employee?.id) {
            if (live) { setEstimates([]); setError("Could not match this tech to a Housecall Pro employee."); setLoading(false); }
            return;
          }
          const now = new Date();
          const start = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0).toISOString();
          const end   = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59).toISOString();
          const estimateData = await callHCP(`/estimates?page_size=100&scheduled_start_min=${start}&scheduled_start_max=${end}`, "GET");
          const rawEstimates = estimateData?.estimates || (Array.isArray(estimateData) ? estimateData : []);
          const assigned = rawEstimates.filter((est) => est.assigned_employees?.some((p) => p.id === employee.id));
          const detailed = await Promise.all(assigned.slice(0, 20).map(async (est) => (await callHCP(`/estimates/${est.id}`, "GET")) || est));
          if (live) { setEstimates(detailed.filter(Boolean)); setLoading(false); }
        })().catch(() => { if (live) { setError("Could not load estimates from Housecall Pro."); setLoading(false); } });
        return () => { live = false; };
      }, [techName]);

      if (loading) return h(LoadingState, { title: "Loading estimates...", body: `Pulling ${techName}'s schedule from Housecall Pro` });

      return pageWrap([
        h("div", { key: "intro", style: { marginBottom: 16 } }, [
          h("div", { key: "title", style: { fontFamily: '"Barlow Condensed", sans-serif', fontWeight: 900, fontSize: 32, letterSpacing: "0.04em" } }, "Today's Estimates"),
          h("div", { key: "sub",   style: { fontSize: 14, color: "var(--text-muted)", marginTop: 4 } }, `${techName}'s jobs for today`)
        ]),
        error ? h("div", { key: "error", style: { ...shellCardStyle({ marginBottom: 14 }), padding: "14px 16px", color: "var(--red)", borderColor: "rgba(255,102,122,0.2)" } }, error) : null,
        estimates.length === 0 ? h(EmptyState, { key: "empty", title: "No estimates scheduled", body: "Nothing is assigned to this tech today, or the schedule could not be matched.", emoji: "🗓️" }) : null,
        ...estimates.map((estimate, index) => {
          const customer = `${estimate.customer?.first_name || ""} ${estimate.customer?.last_name || ""}`.trim() || "Unknown Customer";
          const address  = [estimate.address?.street, estimate.address?.city].filter(Boolean).join(", ");
          const optionCount = estimate.options?.length || 0;
          const estimateNumber = estimate.estimate_number || estimate.id?.slice(-6) || "Pending";
          return h("button", {
            key: estimate.id, type: "button", onClick: () => onSelect(estimate),
            style: { ...shellCardStyle(), width: "100%", marginBottom: 12, padding: 0, textAlign: "left", overflow: "hidden", animation: "floatUp 0.24s ease both", animationDelay: `${index * 0.04}s` }
          }, [
            h("div", { key: "line", style: { height: 4, background: "linear-gradient(90deg, var(--cyan), rgba(50,212,255,0.15))" } }),
            h("div", { key: "body", style: { padding: "16px 16px 18px", display: "flex", gap: 14, alignItems: "center" } }, [
              h("div", { key: "icon", style: { width: 50, height: 50, borderRadius: 16, display: "grid", placeItems: "center", background: "rgba(50,212,255,0.12)", border: "1px solid rgba(50,212,255,0.18)", fontSize: 24, flexShrink: 0 } }, "🏠"),
              h("div", { key: "meta", style: { flex: 1, minWidth: 0 } }, [
                h("div", { key: "customer", style: { fontSize: 17, fontWeight: 800, color: "var(--text)" } }, customer),
                address ? h("div", { key: "address", style: { marginTop: 4, color: "var(--text-muted)", fontSize: 13 } }, address) : null,
                h("div", { key: "badges", style: { marginTop: 10, display: "flex", gap: 8, flexWrap: "wrap" } }, [
                  h(Badge, { key: "num", tone: "cyan" }, `Est #${estimateNumber}`),
                  estimate.work_status ? h(Badge, { key: "status" }, estimate.work_status.replace(/_/g, " ")) : null,
                  optionCount ? h(Badge, { key: "opt", tone: "amber" }, `${optionCount} option${optionCount > 1 ? "s" : ""}`) : null
                ])
              ]),
              h("div", { key: "arrow", style: { color: "var(--text-dim)", fontSize: 24 } }, "›")
            ])
          ]);
        })
      ]);
    }

    // ─── INPUT STEP ──────────────────────────────────────────────────────────────

    function InputStep({ meta, saved, rules, onDone }) {
      const [mode,      setMode]      = useState(saved?.mode || "type");
      const [text,      setText]      = useState(saved?.text || "");
      const [recording, setRecording] = useState(false);
      const [analyzing, setAnalyzing] = useState(false);
      const [error,     setError]     = useState("");
      const [extracted, setExtracted] = useState(saved?.extracted || null);
      const recognitionRef = useRef(null);

      useEffect(() => () => recognitionRef.current?.stop?.(), []);

      const sectionKey = meta.num === 1 ? "request" : meta.num === 2 ? "safety" : "enhancements";
      const scopeKey   = extracted ? Object.keys(extracted).find((k) => k.includes("scopes")) : null;
      const scopes     = scopeKey ? extracted?.[scopeKey] || [] : [];

      function startVoice() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) { setError("Voice input is not available in this browser."); return; }
        setError("");
        const recognition = new SpeechRecognition();
        recognition.continuous = true; recognition.interimResults = true; recognition.lang = "en-US";
        let committed = text;
        recognition.onresult = (event) => {
          let interim = "";
          for (let i = event.resultIndex; i < event.results.length; i++) {
            const transcript = event.results[i][0].transcript;
            if (event.results[i].isFinal) committed += `${transcript} `;
            else interim += transcript;
          }
          setText(`${committed}${interim}`.trimStart());
        };
        recognition.onerror = () => setRecording(false);
        recognition.onend   = () => setRecording(false);
        recognition.start();
        recognitionRef.current = recognition;
        setRecording(true);
      }

      function stopVoice() { recognitionRef.current?.stop?.(); setRecording(false); }

      async function analyze() {
        if (!text.trim()) return;
        setAnalyzing(true); setError("");
        const result = await callClaude(buildSystemPrompt(rules, sectionKey), text.trim());
        if (!result) setError("The AI response could not be parsed. Try re-running it or tightening your notes.");
        else setExtracted(result);
        setAnalyzing(false);
      }

      function removeScope(index) {
        if (!scopeKey) return;
        setExtracted({ ...extracted, [scopeKey]: scopes.filter((_, i) => i !== index) });
      }

      const factEntries = Object.entries(extracted?.job_facts || {}).filter(([, v]) => {
        if (!v) return false;
        if (Array.isArray(v)) return v.length > 0;
        if (typeof v === "boolean") return v;
        return !["unknown", "not mentioned"].includes(String(v).toLowerCase());
      });

      return pageWrap([
        h("section", {
          key: "card",
          style: { ...shellCardStyle({ overflow: "hidden", borderColor: "rgba(255,255,255,0.11)" }) }
        }, [
          h("div", { key: "band", style: { height: 5, background: `linear-gradient(90deg, ${meta.accent}, transparent)` } }),
          h("div", { key: "body", style: { padding: "22px 18px 20px" } }, [
            h("div", { key: "intro", style: { display: "flex", gap: 14, alignItems: "flex-start", marginBottom: 16 } }, [
              h("div", { key: "icon", style: { width: 56, height: 56, borderRadius: 18, display: "grid", placeItems: "center", background: meta.accentSoft, border: "1px solid rgba(255,255,255,0.12)", fontSize: 27, flexShrink: 0 } }, meta.emoji),
              h("div", { key: "copy" }, [
                h("div", { key: "label", style: { color: meta.accent, fontWeight: 800, fontSize: 11, letterSpacing: "0.18em", textTransform: "uppercase", marginBottom: 6 } }, `Step ${meta.num} of 3 — ${meta.label}`),
                h("div", { key: "q",     style: { fontSize: 22, fontWeight: 800, lineHeight: 1.2 } }, meta.question),
                h("div", { key: "sub",   style: { marginTop: 6, color: "var(--text-muted)", fontSize: 14, lineHeight: 1.5 } }, meta.sub)
              ])
            ]),
            h("div", { key: "modes", style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 14 } }, [
              h(SoftButton, { key: "type",  onClick: () => setMode("type"),  selected: mode === "type"  }, "Type"),
              h(SoftButton, { key: "voice", onClick: () => setMode("voice"), selected: mode === "voice" }, "Voice")
            ]),
            mode === "voice"
              ? h("div", { key: "voice-ui", style: { background: "rgba(255,255,255,0.03)", border: "1px solid var(--border)", borderRadius: "18px", padding: "18px 16px", textAlign: "center" } }, [
                  h("button", {
                    key: "mic", type: "button", onClick: recording ? stopVoice : startVoice,
                    style: { width: 92, height: 92, borderRadius: "50%", margin: "0 auto 12px", display: "grid", placeItems: "center", fontSize: 34, background: recording ? "rgba(255,102,122,0.14)" : meta.accentSoft, border: `2px solid ${recording ? "var(--red)" : meta.accent}`, animation: recording ? "pulseRing 1.6s ease-in-out infinite" : "none" }
                  }, recording ? "⏹" : "🎤"),
                  h("div", { key: "label", style: { fontWeight: 800, color: recording ? "var(--red)" : "var(--text-muted)", textTransform: "uppercase", letterSpacing: "0.12em", fontSize: 12 } }, recording ? "Listening" : "Tap to start voice capture"),
                  text ? h("div", { key: "preview", style: { marginTop: 14, background: "rgba(0,0,0,0.18)", border: "1px solid var(--border)", borderRadius: "14px", padding: "12px 14px", textAlign: "left", lineHeight: 1.6, color: "var(--text-muted)", maxHeight: 130, overflowY: "auto" } }, text) : null
                ])
              : h("textarea", {
                  key: "textarea", value: text, onChange: (e) => setText(e.target.value), placeholder: meta.placeholder,
                  style: { width: "100%", minHeight: 148, padding: "14px 16px", borderRadius: "18px", border: "1px solid var(--border)", background: "rgba(255,255,255,0.03)", color: "var(--text)", resize: "vertical", lineHeight: 1.6 }
                }),
            error ? h("div", { key: "error", style: { marginTop: 12, padding: "12px 14px", borderRadius: "14px", border: "1px solid rgba(255,102,122,0.22)", background: "var(--red-deep)", color: "var(--red)", fontWeight: 700, lineHeight: 1.5 } }, error) : null,
            !extracted ? h(PrimaryButton, { key: "analyze", onClick: analyze, disabled: analyzing || !text.trim(), color: meta.accent, style: { marginTop: 14 } }, analyzing ? "Analyzing..." : "Analyze Notes") : null
          ])
        ]),
        extracted ? h("section", { key: "results", style: { ...shellCardStyle(), marginTop: 14, padding: "18px 16px" } }, [
          h("div", { key: "top", style: { display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10, marginBottom: 12 } }, [
            h("div", { key: "label", style: { fontSize: 12, color: meta.accent, fontWeight: 800, letterSpacing: "0.16em", textTransform: "uppercase" } }, "Extracted Scopes"),
            h(Badge, { key: "count", tone: meta.num === 1 ? "cyan" : meta.num === 2 ? "amber" : "green" }, String(scopes.length))
          ]),
          scopes.length
            ? scopes.map((scope, index) => h(ScopeChip, { key: `${scope}-${index}`, text: scope, color: meta.accent, onRemove: () => removeScope(index) }))
            : h("div", { key: "none", style: { color: "var(--text-muted)" } }, "No scopes were extracted."),
          factEntries.length ? h("div", { key: "facts", style: { marginTop: 14, paddingTop: 14, borderTop: "1px solid var(--border)" } }, [
            h("div", { key: "title", style: { fontSize: 12, color: "var(--text-dim)", fontWeight: 800, textTransform: "uppercase", letterSpacing: "0.14em", marginBottom: 10 } }, "Field Intelligence"),
            h("div", { key: "wrap", style: { display: "flex", flexWrap: "wrap", gap: 8 } },
              factEntries.map(([key, value]) => h("div", {
                key, style: { padding: "7px 10px", borderRadius: "12px", background: "rgba(255,255,255,0.04)", border: "1px solid var(--border)", fontSize: 12, lineHeight: 1.4 }
              }, [
                h("span", { key: "k", style: { color: "var(--text-dim)" } }, `${key.replace(/_/g, " ")}: `),
                h("span", { key: "v", style: { color: "var(--text)" } }, Array.isArray(value) ? value.join(", ") : String(value))
              ]))
            )
          ]) : null,
          h(PrimaryButton, { key: "next", onClick: () => onDone({ text, mode, extracted }), color: meta.accent, style: { marginTop: 16 } }, "Looks Good — Next")
        ]) : null
      ]);
    }

    // ─── REVIEW STEP ─────────────────────────────────────────────────────────────

    function ReviewStep({ data, onConfirm }) {
      const sections = [
        { label: "Customer Request", emoji: "🏠", color: "var(--cyan)",  scopes: data.request?.extracted?.requested_scopes || []   },
        { label: "Field Findings",   emoji: "⚡", color: "var(--amber)", scopes: data.safety?.extracted?.safety_scopes    || []     },
        { label: "Upgrade Ideas",    emoji: "💡", color: "var(--green)", scopes: data.enhancements?.extracted?.enhancement_scopes || [] }
      ];
      const payload = { requested: sections[0].scopes, safety: sections[1].scopes, enhancements: sections[2].scopes };
      const total = Object.values(payload).reduce((sum, list) => sum + list.length, 0);

      return pageWrap([
        h("div", { key: "hero", style: { textAlign: "center", marginBottom: 16 } }, [
          h("div", { key: "emoji", style: { fontSize: 40, marginBottom: 8 } }, "📋"),
          h("div", { key: "title", style: { fontFamily: '"Barlow Condensed", sans-serif', fontWeight: 900, fontSize: 34, letterSpacing: "0.04em" } }, "Ready to Build"),
          h("div", { key: "sub",   style: { color: "var(--text-muted)", fontSize: 14, marginTop: 6 } }, `${total} scopes gathered across the visit`)
        ]),
        ...sections.map((section) => h("section", {
          key: section.label,
          style: { ...shellCardStyle(), marginBottom: 12, overflow: "hidden" }
        }, [
          h("div", { key: "head", style: { display: "flex", alignItems: "center", gap: 10, padding: "14px 16px", borderBottom: "1px solid var(--border)", background: "rgba(255,255,255,0.02)" } }, [
            h("div", { key: "emoji", style: { fontSize: 18 } }, section.emoji),
            h("div", { key: "label", style: { color: section.color, fontWeight: 800, letterSpacing: "0.12em", textTransform: "uppercase", fontSize: 12 } }, section.label),

          )

        ]),

            h("div", { key: "bar", style: { display: "flex", gap: 8, marginBottom: 14 } }, [

    // ─── OPTIONS STEP ────────────────────────────────────────────────────────────

    function OptionsStep({ scopes, rules, estimate }) {
      const [loading,     setLoading]     = useState(true);
      const [error,       setError]       = useState("");
      const [aiDebug,     setAiDebug]     = useState(null);
      const [options,     setOptions]     = useState([]);
      const [pricebook,   setPricebook]   = useState([]);
      const [pricingMode, setPricingMode] = useState("in_home");
      const [selected,    setSelected]    = useState({});
      const [expanded,    setExpanded]    = useState(null);
      const [sending,     setSending]     = useState(false);
      const [sent,        setSent]        = useState(false);
      const [sendError,   setSendError]   = useState("");

      async function buildOptions(items, mode) {
        const promptItems = buildPromptPricebookItems(items, mode);
        const result = await callClaude(null, buildOptionsPrompt(scopes, rules, promptItems, mode));
        setAiDebug(result);
        const built = Array.isArray(result?.options)
          ? result.options.map((option) => {
              const matchedItems = Array.isArray(option?.pricebook_items)
                ? option.pricebook_items.map((match) => resolveItem(match, items, mode)).filter(Boolean)
                : [];
              if (!option?.number || !option?.name || !matchedItems.length) return null;
              return {
                ...option,
                pricebook_items: matchedItems,
                includes: matchedItems.map((item) => `${item.quantity > 1 ? `${item.quantity}x ` : ""}${item.name}`)
              };
            }).filter(Boolean)
          : [];
        return built;
      }

      useEffect(() => {
        let live = true;
        setLoading(true); setError(""); setOptions([]);
        (async () => {
          const items = await fetchPricebook();
          if (!live) return;
          setPricebook(items);
          const built = await buildOptions(items, pricingMode);
          if (!live) return;
          if (built.length) setOptions(built);
          else setError("Could not build options from the AI response.");
          setLoading(false);
        })().catch(() => { if (live) { setError("Could not build options."); setLoading(false); } });
        return () => { live = false; };
      }, [pricingMode]);

      async function regenerate() {
        setLoading(true); setError(""); setOptions([]); setSelected({}); setExpanded(null);
        try {
          const built = await buildOptions(pricebook, pricingMode);
          if (built.length) setOptions(built);
          else setError("Could not build options from the AI response.");
        } catch { setError("Could not build options."); }
        setLoading(false);
      }

      const selectedOptions       = options.filter((opt) => selected[opt.number]);
      const inHomeCount           = pricebook.filter((i) => i?.pricing?.in_home != null).length;
      const preferredBuilderCount = pricebook.filter((i) => i?.pricing?.preferred_builder != null).length;
      const availableCount        = pricebook.filter((i) => i?.pricing?.[pricingMode] != null).length;

      async function sendToHCP() {
        if (!estimate?.id || !selectedOptions.length) return;
        setSending(true); setSendError("");
        const warnings = [];
        try {
          for (const option of selectedOptions) {
            const response = await callHCP(`/estimates/${estimate.id}/options`, "POST", {
              name: option.name,
              approval_status: "requires_approval",
              line_items: option.pricebook_items.map((item) => ({
                name: item.name,
                description: item.description || (option.permits_required ? "Permits may be required." : ""),
                unit_price: dollarsToCents(item.price),
                quantity: item.quantity,
                unit_cost: 0
              }))
            });
            console.log("HCP response for", option.name, JSON.stringify(response));
          }
          setSent(true);
        } catch { setSendError("Sending failed. Please try again."); }
        setSending(false);
      }

      if (loading) return pageWrap(h(LoadingState, { title: "Building options...", body: "Grouping scopes into homeowner-friendly estimate choices" }));

      if (error) return pageWrap([
        h(EmptyState, { key: "err", title: "Options couldn't be built", body: error, emoji: "⚠️" }),
        h(PrimaryButton, { key: "retry", onClick: regenerate, style: { marginTop: 14 }, color: "var(--cyan)" }, "Try Again"),
        aiDebug ? h("details", { key: "debug", style: { marginTop: 14 } }, [
          h("summary", { key: "s", style: { color: "var(--text-muted)", fontSize: 12, cursor: "pointer", padding: "8px 0" } }, "Debug: AI raw response"),
          h("pre", { key: "p", style: { fontSize: 11, color: "var(--text-dim)", overflowX: "auto", padding: "12px", background: "rgba(255,255,255,0.03)", borderRadius: 12, border: "1px solid var(--border)" } }, JSON.stringify(aiDebug, null, 2))
        ]) : null
      ]);

      if (sent) return pageWrap(h("div", { style: { ...shellCardStyle(), padding: "34px 22px", textAlign: "center" } }, [
        h("div", { key: "check", style: { width: 84, height: 84, borderRadius: "50%", margin: "0 auto 14px", display: "grid", placeItems: "center", background: "var(--green-deep)", border: "1px solid rgba(49,215,140,0.28)", color: "var(--green)", fontSize: 36, fontWeight: 900 } }, "✓"),
        h("div", { key: "title", style: { fontFamily: '"Barlow Condensed", sans-serif', fontWeight: 900, fontSize: 32, letterSpacing: "0.04em" } }, "Sent to Housecall Pro"),
        h("p",   { key: "body",  style: { margin: "10px 0 0", color: "var(--text-muted)", lineHeight: 1.6 } }, `${selectedOptions.length} option${selectedOptions.length > 1 ? "s were" : " was"} added to Estimate #${estimate.estimate_number || ""}.`),
        sendError ? h("div", { key: "warn", style: { marginTop: 14, padding: "12px 14px", borderRadius: "14px", background: "var(--amber-deep)", border: "1px solid rgba(255,176,32,0.22)", color: "var(--amber)", fontSize: 13, fontWeight: 700, textAlign: "left" } }, sendError) : null,
        h("div", { key: "tip", style: { marginTop: 20, padding: "14px 16px", borderRadius: 16, background: "rgba(50,212,255,0.08)", border: "1px solid rgba(50,212,255,0.2)", textAlign: "left" } }, [
          h("div", { key: "label", style: { color: "var(--cyan)", fontWeight: 800, fontSize: 11, textTransform: "uppercase", letterSpacing: "0.14em", marginBottom: 6 } }, "Add Photos in HCP"),
          h("div", { key: "copy",  style: { color: "var(--text-muted)", fontSize: 13, lineHeight: 1.6 } }, "Open each option in Housecall Pro and attach a finished-work photo. Use the Photo Guide to grab a ready-to-paste link."),
          h(SoftButton, { key: "btn", onClick: props.onOpenPhotoGuide, style: { marginTop: 10, width: "100%", color: "var(--cyan)" } }, "📸 Open Photo Guide")
        ])
      ]));

      return pageWrap([
        pickerFor ? null : null,

        h("div", { key: "intro", style: { marginBottom: 16 } }, [
          h("div", { key: "title", style: { fontFamily: '"Barlow Condensed", sans-serif', fontWeight: 900, fontSize: 32, letterSpacing: "0.04em" } }, `${options.length} Options Ready`),
          h("div", { key: "sub", style: { color: "var(--text-muted)", fontSize: 14, marginTop: 4 } }, "Pick the options you want to send, then add photos if helpful."),
          options.length < 6 ? h("div", { key: "warn", style: { marginTop: 8, padding: "10px 12px", borderRadius: 12, background: "var(--amber-deep)", border: "1px solid rgba(255,176,32,0.22)", color: "var(--amber)", fontSize: 13, fontWeight: 700 } },
            `⚠ Only ${options.length} of 6 options matched pricebook items. Try regenerating.`
          ) : null
        ]),

        h(SoftButton, { key: "regen", onClick: regenerate, style: { width: "100%", marginBottom: 14, color: "var(--cyan)" } }, "↺ Regenerate Options"),

        h("div", { key: "context", style: { ...shellCardStyle(), marginBottom: 14, padding: "14px 16px" } }, [
          h("div", { key: "label", style: { color: "var(--cyan)", fontWeight: 800, fontSize: 11, letterSpacing: "0.16em", textTransform: "uppercase", marginBottom: 6 } }, "Estimate Target"),
          h("div", { key: "name",  style: { fontWeight: 800, fontSize: 15 } }, `${estimate.customer?.first_name || ""} ${estimate.customer?.last_name || ""}`.trim() || "Customer"),
          estimate.address ? h("div", { key: "addr", style: { marginTop: 4, color: "var(--text-muted)", fontSize: 13 } }, [estimate.address.street, estimate.address.city].filter(Boolean).join(", ")) : null,
          h("div", { key: "num", style: { marginTop: 8 } }, h(Badge, { tone: "cyan" }, `Est #${estimate.estimate_number || "Pending"}`))
        ]),

        h("div", { key: "pricing", style: { ...shellCardStyle(), marginBottom: 14, padding: "14px 16px" } }, [
          h("div", { key: "label", style: { color: "var(--green)", fontWeight: 800, fontSize: 11, letterSpacing: "0.16em", textTransform: "uppercase", marginBottom: 6 } }, "Pricing Mode"),
          h("div", { key: "sub",   style: { color: "var(--text-muted)", fontSize: 13, lineHeight: 1.5, marginBottom: 12 } }, "Choose which price book this estimate should follow before sending to Housecall Pro."),
          h("div", { key: "toggle", style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 } }, [
            h(SoftButton, { key: "in",  onClick: () => setPricingMode("in_home"),          selected: pricingMode === "in_home",          style: { width: "100%", padding: "14px 12px", textAlign: "left" } }, `In Home (${inHomeCount})`),
            h(SoftButton, { key: "pb",  onClick: () => setPricingMode("preferred_builder"), selected: pricingMode === "preferred_builder", style: { width: "100%", padding: "14px 12px", textAlign: "left" } }, `Preferred Builder (${preferredBuilderCount})`)
          ]),
          h("div", { key: "available", style: { marginTop: 12, color: "var(--text-muted)", fontSize: 13 } }, `${availableCount} catalog item${availableCount === 1 ? "" : "s"} available.`)
        ]),

        ...options.map((option, index) => {
          const color      = OPTION_COLORS[index % OPTION_COLORS.length];
          const isSelected = !!selected[option.number];
          const isExpanded = expanded === option.number;
          const total      = option.pricebook_items.reduce((sum, item) => sum + item.price * item.quantity, 0);

          return h("section", { key: option.number, style: { ...shellCardStyle({ marginBottom: 12, overflow: "hidden", borderColor: isSelected ? color : "var(--border)" }) } }, [
            h("div", { key: "head", style: { display: "grid", gridTemplateColumns: "56px 1fr 48px", alignItems: "stretch", background: `linear-gradient(135deg, ${color}, ${color}cc)` } }, [
              h("button", { key: "check", type: "button", onClick: () => setSelected((c) => ({ ...c, [option.number]: !c[option.number] })), style: { background: "rgba(0,0,0,0.18)", display: "grid", placeItems: "center" } },
                h("div", { style: { width: 28, height: 28, borderRadius: 8, display: "grid", placeItems: "center", background: isSelected ? "white" : "rgba(255,255,255,0.2)", color: isSelected ? color : "transparent", border: "2px solid rgba(255,255,255,0.45)", fontWeight: 900 } }, "✓")
              ),
              h("button", { key: "summary", type: "button", onClick: () => setExpanded(isExpanded ? null : option.number), style: { padding: "14px 14px 15px", textAlign: "left", background: "transparent", color: "white" } }, [
                h("div", { key: "name",   style: { fontWeight: 800, fontSize: 17, lineHeight: 1.2 } }, option.name),
                option.focus_statement ? h("div", { key: "focus", style: { marginTop: 4, fontSize: 12, fontWeight: 700, color: "rgba(255,255,255,0.82)" } }, option.focus_statement) : null,
                h("div", { key: "badges", style: { marginTop: 7, display: "flex", gap: 8, flexWrap: "wrap" } }, [
                  h("span", { key: "tier", style: { fontSize: 11, fontWeight: 800, letterSpacing: "0.08em", textTransform: "uppercase", color: "rgba(255,255,255,0.78)" } }, TIER_LABELS[option.tier] || option.tier),
                  option.permits_required ? h(Badge, { key: "permits", tone: "amber" }, "Permits") : null
                ])
              ]),
              h("button", { key: "toggle", type: "button", onClick: () => setExpanded(isExpanded ? null : option.number), style: { background: "rgba(0,0,0,0.14)", color: "rgba(255,255,255,0.75)", fontSize: 18 } }, isExpanded ? "▴" : "▾")
            ]),
            isExpanded ? h("div", { key: "detail", style: { padding: "16px 16px 18px", borderTop: "1px solid var(--border)" } }, [
              h("div", { key: "value", style: { color: "var(--text-muted)", fontSize: 14, fontStyle: "italic", lineHeight: 1.6, marginBottom: 12 } }, `"${option.value_statement}"`),
              h("div", { key: "total", style: { marginBottom: 12, display: "inline-flex", alignItems: "center", gap: 6, padding: "6px 10px", borderRadius: "999px", background: "rgba(255,255,255,0.06)", border: "1px solid var(--border)", fontWeight: 700 } }, `Estimated total: $${total.toFixed(2)}`),
              h("div", { key: "inclabel", style: { color: "var(--text-dim)", fontSize: 12, fontWeight: 800, textTransform: "uppercase", letterSpacing: "0.16em", marginBottom: 10 } }, "What's Included"),
              ...option.pricebook_items.map((item, i) => h("div", { key: `${option.number}-${i}`, style: { display: "flex", alignItems: "center", gap: 10, marginBottom: 8, padding: "11px 12px", borderRadius: "14px", background: "rgba(255,255,255,0.04)", border: "1px solid var(--border)" } }, [
                h("div", { key: "dot",   style: { width: 8, height: 8, borderRadius: "50%", background: color, flexShrink: 0 } }),
                h("div", { key: "text",  style: { flex: 1, fontWeight: 600, lineHeight: 1.5 } }, `${item.quantity > 1 ? `${item.quantity}x ` : ""}${item.name}`),
                h("div", { key: "price", style: { fontWeight: 700, color: "var(--text-muted)" } }, `$${(item.price * item.quantity).toFixed(2)}`)
              ]))
            ]) : null
          ]);
        }),

        sendError && !sent ? h("div", { key: "senderr", style: { ...shellCardStyle(), marginBottom: 12, padding: "12px 14px", color: "var(--red)", borderColor: "rgba(255,102,122,0.2)" } }, sendError) : null,
        selectedOptions.length ? h(PrimaryButton, { key: "send", onClick: sendToHCP, disabled: sending, color: "var(--amber)" },
          sending ? "Sending to Housecall Pro..." : `Add ${selectedOptions.length} Option${selectedOptions.length > 1 ? "s" : ""} to Housecall Pro`
        ) : null
      ]);
    }

    // ─── PHOTO GUIDE ─────────────────────────────────────────────────────────────

    function PhotoGuide({ onClose }) {
      const [photos,  setPhotos]  = useState([]);
      const [loading, setLoading] = useState(true);
      const [copied,  setCopied]  = useState(null);
      const [fullscreen, setFullscreen] = useState(null);

      useEffect(() => {
        fetchCloudinaryEstimatePhotos().then((result) => {
          setPhotos(result);
          setLoading(false);
        });
      }, []);

      function copyUrl(url, id) {
        if (navigator.clipboard) {
          navigator.clipboard.writeText(url).then(() => {
            setCopied(id);
            setTimeout(() => setCopied(null), 2000);
          });
        }
      }

      return h("div", {
        style: { position: "fixed", inset: 0, background: "rgba(7,10,15,0.92)", backdropFilter: "blur(14px)", zIndex: 40, display: "flex", flexDirection: "column" }
      }, [
        h("div", { key: "head", style: { display: "flex", alignItems: "center", justifyContent: "space-between", padding: "16px 20px", borderBottom: "1px solid var(--border)", background: "rgba(17,21,28,0.8)" } }, [
          h("div", { key: "copy" }, [
            h("div", { key: "title", style: { fontFamily: '"Barlow Condensed", sans-serif', fontWeight: 900, fontSize: 24, letterSpacing: "0.06em" } }, "📸 PHOTO GUIDE"),
            h("div", { key: "sub",   style: { color: "var(--text-muted)", fontSize: 13, marginTop: 2 } }, "Tap a photo to view full screen. Use Copy Link to paste into HCP.")
          ]),
          h(SoftButton, { key: "close", onClick: onClose }, "Close")
        ]),
        loading ? h("div", { key: "loading", style: { flex: 1, display: "flex", alignItems: "center", justifyContent: "center" } },
          h(LoadingState, { title: "Loading photos...", body: "Pulling from Cloudinary" })
        ) : photos.length === 0 ? h("div", { key: "empty", style: { flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 } },
          h(EmptyState, { title: "No photos found", body: "Upload finished-work photos to your Cloudinary 'Estimate Pics' folder.", emoji: "📷" })
        ) : h("div", { key: "grid", style: { flex: 1, overflowY: "auto", padding: 16, display: "grid", gridTemplateColumns: "repeat(2, minmax(0, 1fr))", gap: 12, alignContent: "start" } },
          photos.map((photo) => h("div", {
            key: photo.id || photo.public_id,
            style: { borderRadius: 16, overflow: "hidden", border: "1px solid var(--border)", background: "var(--bg-panel)" }
          }, [
            h("button", {
              key: "img", type: "button",
              onClick: () => setFullscreen(photo),
              style: { display: "block", width: "100%", padding: 0, background: "transparent" }
            }, h("div", { style: { aspectRatio: "4/3", overflow: "hidden" } },
              h("img", { src: photo.thumb || photo.url, alt: photo.label || "Estimate photo", loading: "lazy", style: { width: "100%", height: "100%", objectFit: "cover" } })
            )),
            h("div", { key: "footer", style: { padding: "10px 12px" } }, [
              h("div", { key: "label", style: { fontSize: 12, fontWeight: 800, marginBottom: 8, color: "var(--text)", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" } }, photo.label || photo.public_id || "Estimate photo"),
              h("button", {
                key: "copy", type: "button",
                onClick: () => copyUrl(photo.url, photo.id || photo.public_id),
                style: {
                  width: "100%", padding: "8px 10px", borderRadius: 10,
                  background: copied === (photo.id || photo.public_id) ? "var(--green-deep)" : "rgba(255,255,255,0.06)",
                  border: `1px solid ${copied === (photo.id || photo.public_id) ? "rgba(49,215,140,0.3)" : "var(--border)"}`,
                  color: copied === (photo.id || photo.public_id) ? "var(--green)" : "var(--text-muted)",
                  fontSize: 12, fontWeight: 800, letterSpacing: "0.06em", textTransform: "uppercase"
                }
              }, copied === (photo.id || photo.public_id) ? "✓ Copied!" : "Copy Link")
            ])
          ]))
        ),
        fullscreen ? h("div", {
          key: "fullscreen",
          onClick: () => setFullscreen(null),
          style: { position: "fixed", inset: 0, zIndex: 50, background: "#000", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }
        }, [
          h("img", { key: "img", src: fullscreen.url, alt: fullscreen.label, style: { width: "100%", height: "100%", objectFit: "contain" } }),
          h("div", { key: "hint", style: { position: "absolute", bottom: 24, left: 0, right: 0, textAlign: "center", color: "rgba(255,255,255,0.4)", fontSize: 12, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase" } }, "Tap to close")
        ]) : null
      ]);
    }

    // ─── INTELLIGENCE SCREEN ─────────────────────────────────────────────────────

    function IntelligenceScreen({ rules, onBack, onSave }) {
      const [localRules, setLocalRules] = useState(rules);
      const [showAdd,    setShowAdd]    = useState(false);
      const [trigger,    setTrigger]    = useState("");
      const [result,     setResult]     = useState("");

      function addRule() {
        if (!trigger.trim() || !result.trim()) return;
        const updated = [...localRules, { id: Date.now(), trigger: trigger.trim(), result: result.trim() }];
        setLocalRules(updated); onSave(updated); setTrigger(""); setResult(""); setShowAdd(false);
      }

      function removeRule(id) {
        const updated = localRules.filter((r) => r.id !== id);
        setLocalRules(updated); onSave(updated);
      }

      return h("div", null, [
        h("div", { key: "top", style: { paddingTop: 10 } }, pageWrap([
          h("div", { key: "back", style: { marginBottom: 12 } }, h(SoftButton, { onClick: onBack }, "← Back")),
          h("div", { key: "hero", style: { ...shellCardStyle(), padding: "22px 18px" } }, [
            h("div", { key: "eyebrow", style: { color: "var(--amber)", fontWeight: 800, fontSize: 11, textTransform: "uppercase", letterSpacing: "0.18em", marginBottom: 10 } }, "Electrical Rules Engine"),
            h("div", { key: "title",   style: { fontFamily: '"Barlow Condensed", sans-serif', fontWeight: 900, fontSize: 34, letterSpacing: "0.04em" } }, "Field Intelligence"),
            h("p",   { key: "body",    style: { margin: "10px 0 0", color: "var(--text-muted)", lineHeight: 1.6 } }, "These rules teach FieldGuide how to expand field notes into real scope. Keep them practical and specific.")
          ]),
          h(SoftButton, { key: "toggle", onClick: () => setShowAdd((c) => !c), style: { marginTop: 14, width: "100%", padding: "14px 16px", color: showAdd ? "var(--text-muted)" : "var(--green)" } }, showAdd ? "Cancel" : "Add New Rule"),
          showAdd ? h("div", { key: "form", style: { ...shellCardStyle(), marginTop: 12, padding: "16px" } }, [
            h("div", { key: "l1", style: { marginBottom: 8, color: "var(--green)", fontWeight: 800, fontSize: 12, textTransform: "uppercase", letterSpacing: "0.14em" } }, "When tech sees..."),
            h("textarea", { key: "trigger", value: trigger, onChange: (e) => setTrigger(e.target.value), placeholder: "Example: panel is full, 200A service, no room for EV charger breaker", style: { width: "100%", minHeight: 84, resize: "vertical", padding: "12px 14px", borderRadius: "14px", border: "1px solid var(--border)", background: "rgba(255,255,255,0.03)", color: "var(--text)" } }),
            h("div", { key: "l2", style: { margin: "14px 0 8px", color: "var(--green)", fontWeight: 800, fontSize: 12, textTransform: "uppercase", letterSpacing: "0.14em" } }, "AI should include..."),
            h("textarea", { key: "result", value: result, onChange: (e) => setResult(e.target.value), placeholder: "Example: offer sub-panel or load calculation before recommending full service upgrade", style: { width: "100%", minHeight: 84, resize: "vertical", padding: "12px 14px", borderRadius: "14px", border: "1px solid var(--border)", background: "rgba(255,255,255,0.03)", color: "var(--text)" } }),
            h(PrimaryButton, { key: "save", onClick: addRule, color: "var(--green)", style: { marginTop: 14 } }, "Save Rule")
          ]) : null,
          h("div", { key: "count", style: { marginTop: 16, marginBottom: 10 } }, h(Badge, { tone: "amber" }, `${localRules.length} active rules`)),
          ...localRules.map((rule) => h("div", { key: rule.id, style: { ...shellCardStyle(), marginBottom: 12, overflow: "hidden" } }, [
            h("div", { key: "a", style: { padding: "14px 16px", borderBottom: "1px solid var(--border)" } }, [
              h("div", { key: "label",   style: { color: "var(--amber)", fontWeight: 800, fontSize: 11, textTransform: "uppercase", letterSpacing: "0.14em", marginBottom: 6 } }, "When tech sees..."),
              h("div", { key: "trigger", style: { lineHeight: 1.55, fontWeight: 700 } }, rule.trigger)
            ]),
            h("div", { key: "b", style: { padding: "14px 16px", background: "rgba(49,215,140,0.04)", borderBottom: "1px solid var(--border)" } }, [
              h("div", { key: "label",  style: { color: "var(--green)", fontWeight: 800, fontSize: 11, textTransform: "uppercase", letterSpacing: "0.14em", marginBottom: 6 } }, "AI includes..."),
              h("div", { key: "result", style: { lineHeight: 1.55, color: "var(--text-muted)" } }, rule.result)
            ]),
            h("div", { key: "c", style: { padding: "10px 16px", display: "flex", justifyContent: "flex-end" } },
              h(SoftButton, { onClick: () => removeRule(rule.id), style: { color: "var(--red)" } }, "Remove")
            )
          ]))
        ]))
      ]);
    }

    // ─── FIELD GUIDE ROOT ────────────────────────────────────────────────────────

    function FieldGuide() {
      const [tech,      setTech]      = useState(null);
      const [step,      setStep]      = useState("job");
      const [estimate,  setEstimate]  = useState(null);
      const [data,      setData]      = useState({});
      const [scopes,    setScopes]    = useState(null);
      const [rules,     setRules]     = useState(loadRules);
      const [showRules, setShowRules] = useState(false);
      const [showPhotos, setShowPhotos] = useState(false);

      function resetFlow() { setStep("job"); setEstimate(null); setData({}); setScopes(null); }

      function saveStep(key, result) {
        setData((c) => ({ ...c, [key]: result }));
        if (key === "request")      setStep("safety");
        if (key === "safety")       setStep("enhancements");
        if (key === "enhancements") setStep("review");
      }

      function jobName() {
        if (!estimate) return "";
        const customer = `${estimate.customer?.first_name || ""} ${estimate.customer?.last_name || ""}`.trim();
        return customer ? `${customer} — Est #${estimate.estimate_number || "Pending"}` : `Est #${estimate.estimate_number || "Pending"}`;
      }

      if (!tech) return h(TechSelector, { onSelect: setTech });

      if (showRules) return h(React.Fragment, null, [
        h(Header, { key: "header", techName: tech, jobName: jobName(), step, onReset: resetFlow, onOpenRules: () => setShowRules(false), onOpenPhotos: () => { setShowRules(false); setShowPhotos(true); } }),
        h(IntelligenceScreen, { key: "rules", rules, onBack: () => setShowRules(false), onSave: (updated) => { setRules(updated); saveRules(updated); } })
      ]);

      return h("div", null, [
        showPhotos ? h(PhotoGuide, { key: "photoguide", onClose: () => setShowPhotos(false) }) : null,
        h(Header, { key: "header", techName: tech, jobName: jobName(), step, onReset: resetFlow, onOpenRules: () => setShowRules(true), onOpenPhotos: () => setShowPhotos(true) }),
        step === "job"          ? h(JobPicker,   { key: "jobs",         techName: tech, onSelect: (est) => { setEstimate(est); setStep("request"); } }) : null,
        step === "request"      ? h(InputStep,   { key: "request",      meta: STEP_META.request,      saved: data.request,      rules, onDone: (r) => saveStep("request", r)      }) : null,
        step === "safety"       ? h(InputStep,   { key: "safety",       meta: STEP_META.safety,       saved: data.safety,       rules, onDone: (r) => saveStep("safety", r)       }) : null,
        step === "enhancements" ? h(InputStep,   { key: "enhancements", meta: STEP_META.enhancements, saved: data.enhancements, rules, onDone: (r) => saveStep("enhancements", r) }) : null,
        step === "review"       ? h(ReviewStep,  { key: "review",  data,   onConfirm: (payload) => { setScopes(payload); setStep("options"); } }) : null,
        step === "options" && scopes ? h(OptionsStep, { key: "options", scopes, rules, estimate, onOpenPhotoGuide: () => setShowPhotos(true) }) : null
      ]);
    }

    createRoot(document.getElementById("root")).render(h(FieldGuide));
  </script>
</body>
</html>
