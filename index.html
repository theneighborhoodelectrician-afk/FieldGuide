      --amber: #ffb11f;
      --amber-soft: rgba(255, 177, 31, 0.14);
      --green: #34d58b;
      --green-soft: rgba(52, 213, 139, 0.14);
      --red: #ff6a7f;
      --red-soft: rgba(255, 106, 127, 0.14);
      --container: 560px;
      --shadow: 0 16px 40px rgba(0, 0, 0, 0.32);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }

        linear-gradient(180deg, #11151c 0%, #0d1015 100%);
      -webkit-font-smoothing: antialiased;
    }

    button, input, textarea { font: inherit; }
    button { border: 0; cursor: pointer; }
    img { display: block; max-width: 100%; }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>

        if (system) body.system = system;
        try {

            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body)

          var raw = get(data, "content.0.text", "");
          var cleaned = String(raw).replace(/```json|```/g, "").trim();
          return safeJsonParse(cleaned, null);
        } catch (error) {
          return null;
        }
      }

        try {
          return await requestJson("/api/claude?action=hcp", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ endpoint: endpoint, method: method || "GET", body: body || null })

        } catch (error) {
          return null;

          return { error: error.message };

          return {
            id: photo.id,
            label: photo.label,
            emoji: photo.emoji,
            tags: photo.tags,
            url: photo.url,
            score: score
